<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luas 3D Replay</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; }
        #map { position: fixed; inset: 0; }

        #controls {
            position: fixed; top: 16px; left: 16px; z-index: 10;
            background: rgba(14, 17, 28, 0.93);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; padding: 16px 20px; min-width: 310px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.55);
        }
        h1 { font-size: 15px; color: #e94560; margin-bottom: 12px; font-weight: 600; letter-spacing: 0.01em; }
        .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
        label { font-size: 12px; color: #888; }
        select {
            background: #1a1e2e; color: #ddd; border: 1px solid rgba(255,255,255,0.12);
            border-radius: 5px; padding: 4px 8px; font-size: 12px;
        }
        button {
            border: none; border-radius: 5px; padding: 6px 16px;
            cursor: pointer; font-size: 12px; font-weight: 500;
        }
        #load-btn  { background: #e94560; color: white; }
        #load-btn:hover { background: #c73652; }
        #load-btn:disabled { background: #333; color: #666; cursor: default; }
        #play-btn  { background: #1e5c30; color: #6fcf87; }
        #play-btn:hover { background: #266b3a; }
        #play-btn:disabled { background: #333; color: #555; cursor: default; }
        #slider-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        #slider { flex: 1; accent-color: #e94560; }
        #time-display { font-size: 12px; color: #888; min-width: 65px; font-variant-numeric: tabular-nums; }
        #stats { font-size: 11px; color: #555; margin-top: 4px; }
        #loading-bar { height: 3px; background: #1a1e2e; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        #loading-fill { height: 100%; background: #e94560; width: 0%; transition: width 0.3s; }
        #loading-text { font-size: 11px; color: #555; margin-top: 4px; }

        #legend {
            position: fixed; bottom: 32px; left: 16px; z-index: 10;
            background: rgba(14, 17, 28, 0.93); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #aaa;
            box-shadow: 0 2px 16px rgba(0,0,0,0.5);
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
        .swatch { width: 28px; height: 4px; border-radius: 2px; }

        #hint {
            position: fixed; bottom: 32px; right: 16px; z-index: 10;
            font-size: 11px; color: #666;
            background: rgba(14,17,28,0.85); border: 1px solid rgba(255,255,255,0.06);
            padding: 5px 9px; border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="controls">
    <h1>🚊 Luas 3D Replay</h1>
    <div class="row">
        <label>Date:</label>
        <select id="date-select"><option>Loading…</option></select>
        <label>Hour:</label>
        <select id="hour-select"></select>
    </div>
    <div class="row">
        <button id="load-btn" disabled>Load</button>
        <button id="play-btn" disabled>▶ Play</button>
    </div>
    <div id="slider-row">
        <input type="range" id="slider" min="0" max="100" value="0" disabled>
        <span id="time-display">--:--:--</span>
    </div>
    <div id="stats">Trams: 0</div>
    <div id="loading-bar"><div id="loading-fill"></div></div>
    <div id="loading-text">Initialising map…</div>
</div>

<div id="legend">
    <div class="legend-item"><div class="swatch" style="background:#e94560"></div> Red Line</div>
    <div class="legend-item"><div class="swatch" style="background:#4caf50"></div> Green Line</div>
</div>

<div id="hint">Drag · Ctrl+drag to tilt · Scroll to zoom</div>

<script>
const MAPBOX_TOKEN = 'YOUR_MAPBOX_TOKEN';
const API = 'https://sumitnarang.com/luas-api';

mapboxgl.accessToken = MAPBOX_TOKEN;

// ── Map ────────────────────────────────────────────────────────────────
const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [-6.2750, 53.3420],
    zoom: 12.2,
    pitch: 58,
    bearing: -15,
    antialias: true
});

map.addControl(new mapboxgl.NavigationControl({ visualizePitch: true }), 'top-right');

// ── Progress ───────────────────────────────────────────────────────────
function setProgress(pct, text) {
    document.getElementById('loading-fill').style.width = pct + '%';
    document.getElementById('loading-text').textContent = text;
}

// ── Replay state ───────────────────────────────────────────────────────
let stops = [], frames = [], frameIndex = 0;
let playing = false, playInterval = null, animFrameId = null;
const tramTrails = {};   // key → { positions: [[lng,lat]…], color }
const TRAIL_MAX = 40;

function lerp(a, b, t) { return a + (b - a) * t; }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

function getTramMap(frameData) {
    const trams = new Map();
    frameData[1].forEach(row => {
        const s = stops.find(s => s.stop_abv === row.stop_abv);
        if (!s) return;
        const key = `${row.destination}-${row.direction}`;
        if (!trams.has(key) || trams.get(key).due_mins > row.due_mins)
            trams.set(key, { ...row, stop_lat: s.latitude, stop_lon: s.longitude, line: s.line });
    });
    return trams;
}

function buildFrames(data) {
    const grouped = {};
    data.forEach(row => { const t = row.observed_at; if (!grouped[t]) grouped[t] = []; grouped[t].push(row); });
    return Object.entries(grouped).sort((a, b) => a[0].localeCompare(b[0]));
}

// ── Trail + tram rendering ─────────────────────────────────────────────
function renderFrame(frameData, prevFrameData, duration = 180) {
    if (animFrameId) cancelAnimationFrame(animFrameId);
    const toMap = getTramMap(frameData);
    const fromMap = prevFrameData ? getTramMap(prevFrameData) : null;

    // Update trails
    for (const [key, tram] of toMap) {
        const color = tram.line === 'Red' ? '#e94560' : '#4caf50';
        if (!tramTrails[key]) tramTrails[key] = { positions: [], color };
        const trail = tramTrails[key];
        const pos = [tram.stop_lon, tram.stop_lat];
        const last = trail.positions[trail.positions.length - 1];
        if (!last || last[0] !== pos[0] || last[1] !== pos[1]) {
            trail.positions.push(pos);
            if (trail.positions.length > TRAIL_MAX) trail.positions.shift();
        }
    }
    for (const key of Object.keys(tramTrails)) {
        if (!toMap.has(key)) delete tramTrails[key];
    }
    updateTrailSource();

    // Animate tram positions
    const start = performance.now();
    function tick(now) {
        const raw = Math.min((now - start) / duration, 1);
        const t = easeInOut(raw);

        const features = [];
        for (const [key, tram] of toMap) {
            let lat = tram.stop_lat, lon = tram.stop_lon;
            if (fromMap?.has(key)) {
                const from = fromMap.get(key);
                lat = lerp(from.stop_lat, tram.stop_lat, t);
                lon = lerp(from.stop_lon, tram.stop_lon, t);
            }
            features.push({
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [lon, lat] },
                properties: { color: tram.line === 'Red' ? '#e94560' : '#4caf50' }
            });
        }
        map.getSource('trams').setData({ type: 'FeatureCollection', features });

        document.getElementById('stats').textContent = `Trams: ${toMap.size}`;
        document.getElementById('time-display').textContent =
            new Date(frameData[0]).toLocaleTimeString('en-IE', { timeZone: 'Europe/Dublin' });

        if (raw < 1) animFrameId = requestAnimationFrame(tick);
    }
    animFrameId = requestAnimationFrame(tick);
}

function updateTrailSource() {
    if (!map.getSource('trails')) return;
    const features = Object.entries(tramTrails)
        .filter(([, t]) => t.positions.length >= 2)
        .map(([, t]) => ({
            type: 'Feature',
            geometry: { type: 'LineString', coordinates: t.positions },
            properties: { color: t.color }
        }));
    map.getSource('trails').setData({ type: 'FeatureCollection', features });
}

// ── Map ready ──────────────────────────────────────────────────────────
map.on('style.load', async () => {

    // ── 3D buildings ───────────────────────────────────────────────────
    const labelLayer = map.getStyle().layers.find(
        l => l.type === 'symbol' && l.layout['text-field']
    );
    map.addLayer({
        id: 'buildings-3d',
        source: 'composite',
        'source-layer': 'building',
        filter: ['==', 'extrude', 'true'],
        type: 'fill-extrusion',
        minzoom: 10,           // start loading building data from zoom 10
        paint: {
            'fill-extrusion-color': [
                'interpolate', ['linear'], ['get', 'height'],
                0, '#1e2235', 30, '#252840', 80, '#2e3355'
            ],
            // buildings grow in between zoom 11 → 11.8 (visible much earlier)
            'fill-extrusion-height': [
                'interpolate', ['linear'], ['zoom'],
                11, 0, 11.8, ['get', 'height']
            ],
            'fill-extrusion-base': ['get', 'min_height'],
            'fill-extrusion-opacity': [
                'interpolate', ['linear'], ['zoom'],
                10, 0, 11, 0.85
            ]
        }
    }, labelLayer?.id);

    setProgress(20, 'Fetching stops…');
    stops = await fetch(`${API}/api/stops`).then(r => r.json());

    // ── Routes as GeoJSON ──────────────────────────────────────────────
    const redStops  = stops.filter(s => s.line === 'Red').sort((a, b) => a.longitude - b.longitude);
    const greenStops = stops.filter(s => s.line === 'Green').sort((a, b) => a.latitude - b.latitude);

    function stopsToLine(arr) {
        return { type: 'Feature', geometry: { type: 'LineString', coordinates: arr.map(s => [s.longitude, s.latitude]) } };
    }

    for (const [id, feature, color] of [
        ['red-route',   stopsToLine(redStops),   '#e94560'],
        ['green-route', stopsToLine(greenStops), '#4caf50']
    ]) {
        map.addSource(id, { type: 'geojson', data: feature });
        // outer glow
        map.addLayer({ id: `${id}-glow`, type: 'line', source: id,
            paint: { 'line-color': color, 'line-width': 14, 'line-opacity': 0.12, 'line-blur': 8 }
        }, labelLayer?.id);
        // mid glow
        map.addLayer({ id: `${id}-mid`, type: 'line', source: id,
            paint: { 'line-color': color, 'line-width': 5, 'line-opacity': 0.30, 'line-blur': 2 }
        }, labelLayer?.id);
        // sharp core
        map.addLayer({ id: `${id}-core`, type: 'line', source: id,
            paint: { 'line-color': color, 'line-width': 2.5, 'line-opacity': 0.95 }
        }, labelLayer?.id);
    }

    // ── Stops ──────────────────────────────────────────────────────────
    const stopGeoJSON = {
        type: 'FeatureCollection',
        features: stops.map(s => ({
            type: 'Feature',
            geometry: { type: 'Point', coordinates: [s.longitude, s.latitude] },
            properties: { color: s.line === 'Red' ? '#e94560' : '#4caf50', name: s.stop_abv }
        }))
    };
    map.addSource('stops', { type: 'geojson', data: stopGeoJSON });
    map.addLayer({ id: 'stops-glow', type: 'circle', source: 'stops',
        paint: { 'circle-radius': 9, 'circle-color': ['get', 'color'], 'circle-opacity': 0.18, 'circle-blur': 1 }
    });
    map.addLayer({ id: 'stops-dot', type: 'circle', source: 'stops',
        paint: {
            'circle-radius': 5,
            'circle-color': ['get', 'color'],
            'circle-stroke-width': 2,
            'circle-stroke-color': '#ffffff'
        }
    });
    map.addLayer({ id: 'stop-labels', type: 'symbol', source: 'stops',
        minzoom: 14,
        layout: {
            'text-field': ['get', 'name'],
            'text-size': 11,
            'text-offset': [0, 1.3],
            'text-anchor': 'top',
            'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular']
        },
        paint: {
            'text-color': '#ddd',
            'text-halo-color': 'rgba(0,0,0,0.7)',
            'text-halo-width': 1.5
        }
    });

    // ── Tram trails ────────────────────────────────────────────────────
    map.addSource('trails', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    map.addLayer({ id: 'trails-glow', type: 'line', source: 'trails',
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: { 'line-color': ['get', 'color'], 'line-width': 16, 'line-opacity': 0.15, 'line-blur': 10 }
    });
    map.addLayer({ id: 'trails-core', type: 'line', source: 'trails',
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: { 'line-color': ['get', 'color'], 'line-width': 5, 'line-opacity': 0.80 }
    });

    // ── Trams ──────────────────────────────────────────────────────────
    map.addSource('trams', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    map.addLayer({ id: 'trams-halo', type: 'circle', source: 'trams',
        paint: { 'circle-radius': 20, 'circle-color': ['get', 'color'], 'circle-opacity': 0.18, 'circle-blur': 1 }
    });
    map.addLayer({ id: 'trams-glow', type: 'circle', source: 'trams',
        paint: { 'circle-radius': 14, 'circle-color': ['get', 'color'], 'circle-opacity': 0.30, 'circle-blur': 0.5 }
    });
    map.addLayer({ id: 'trams-dot', type: 'circle', source: 'trams',
        paint: {
            'circle-radius': 9,
            'circle-color': ['get', 'color'],
            'circle-stroke-width': 2.5,
            'circle-stroke-color': '#ffffff'
        }
    });

    setProgress(80, 'Loading dates…');
    await loadDates();
    loadHours();
    setProgress(100, 'Ready — pick a date and hour');
    setTimeout(() => {
        document.getElementById('loading-bar').style.display = 'none';
        document.getElementById('loading-text').style.display = 'none';
    }, 800);
    document.getElementById('load-btn').disabled = false;
});

// ── UI ─────────────────────────────────────────────────────────────────
async function loadDates() {
    const dates = await fetch(`${API}/api/dates`).then(r => r.json());
    document.getElementById('date-select').innerHTML =
        dates.map(d => `<option value="${d}">${d}</option>`).join('');
}

function loadHours() {
    const sel = document.getElementById('hour-select');
    for (let h = 0; h < 24; h++)
        sel.innerHTML += `<option value="${h}">${String(h).padStart(2,'0')}:00</option>`;
    sel.value = 8;
}

document.getElementById('load-btn').addEventListener('click', async () => {
    const date = document.getElementById('date-select').value;
    const hour = document.getElementById('hour-select').value;
    const btn = document.getElementById('load-btn');
    btn.disabled = true; btn.textContent = 'Loading…';
    Object.keys(tramTrails).forEach(k => delete tramTrails[k]);
    updateTrailSource();

    const data = await fetch(`${API}/api/replay?date=${date}&hour=${hour}`).then(r => r.json());
    frames = buildFrames(data);
    frameIndex = 0;
    const slider = document.getElementById('slider');
    slider.max = frames.length - 1; slider.value = 0; slider.disabled = false;
    document.getElementById('play-btn').disabled = false;
    btn.disabled = false; btn.textContent = 'Load';
    if (frames.length > 0) renderFrame(frames[0], null, 0);
});

document.getElementById('slider').addEventListener('input', e => {
    frameIndex = parseInt(e.target.value);
    if (frames[frameIndex]) renderFrame(frames[frameIndex], frames[frameIndex - 1], 150);
});

document.getElementById('play-btn').addEventListener('click', () => {
    const btn = document.getElementById('play-btn');
    if (playing) {
        clearInterval(playInterval); playing = false;
        btn.textContent = '▶ Play';
    } else {
        playing = true; btn.textContent = '⏸ Pause';
        playInterval = setInterval(() => {
            if (frameIndex >= frames.length - 1) {
                clearInterval(playInterval); playing = false;
                btn.textContent = '▶ Play'; return;
            }
            const prev = frames[frameIndex++];
            document.getElementById('slider').value = frameIndex;
            renderFrame(frames[frameIndex], prev, 180);
        }, 200);
    }
});
</script>
</body>
</html>
