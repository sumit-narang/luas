        ctx.lineWidth = width; ctx.strokeStyle = color; ctx.lineCap = 'round';
        ctx.stroke();
    };

    const hourTimes = [];
    for (let t = anchor.getTime(); t <= t1 + STEP; t += STEP) {
        const x = toX(t);
        if (x < 0 || x > w) continue;
        const min = new Date(t).getUTCMinutes();
        const isHour = min === 0, isMid = min === 30;
        if (isHour) hourTimes.push(t);
        const tickH = isHour ? 22 : isMid ? 13 : 7;
        vline(x, baseY - tickH,
            isHour ? 1.5 : 1,
            isHour ? inkHi : isMid ? inkMid : inkLo);
    }

    if (tlCfg.hours && hourTimes.length) {
        const first = hourTimes[0], last = hourTimes[hourTimes.length - 1];
        ctx.save();
        ctx.font = "11px 'Inter', -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.fillStyle = labelInk;
        ctx.shadowColor = labelShadow; ctx.shadowBlur = 4;
        for (const t of hourTimes) {
            const hr = Math.round(dubHour(t));
            if (!(hr % 3 === 0 || t === first || t === last)) continue;
            const x = toX(t);
            ctx.textAlign = t === first ? 'left' : t === last ? 'right' : 'center';
            ctx.fillText(fmtHourShort(t), x, baseY - 26);
        }
        ctx.restore();
    }

    // ── Playhead (thin orange line, no pill) ────────────────────────────
    const headTop = Math.max(2, baseY - 30);   // confine to the scrubber zone
    if (frames[frameIndex]) {
        const px = toX(new Date(frames[frameIndex][0]).getTime());
        // Clean orange bar: bottom on the tick baseline, top just below the hour
        // label (taller than the grey ticks so it stands out).
        vline(px, baseY - 24, 3, '#f97316');
    }

    // ── Hover preview (light bubble that follows the cursor) ───────────
    const hov = document.getElementById('timeline-hover');
    if (tlCfg.bubble && hoverX != null) {
        const x = Math.max(0, Math.min(w, hoverX));
        vline(x, baseY - 24, 1.5, 'rgba(249,115,22,0.6)');   // orange, matches the playhead
        hov.style.left = Math.max(28, Math.min(w - 28, x)) + 'px';
        hov.style.display = 'block';
        // time under the cursor + how many trams were running then (the histogram value)
        const counts = getFrameCounts();
        const fi = Math.max(0, Math.min(frames.length - 1, Math.round((x / w) * (frames.length - 1))));
        const hhmm = new Date(t0 + (x / w) * dur).toLocaleTimeString('en-IE',
            { timeZone: 'Europe/Dublin', hour: '2-digit', minute: '2-digit' });
        hov.textContent = `${hhmm} · ${counts[fi]} Running`;
    } else if (hov) {
        hov.style.display = 'none';
    }
}

function scrubTimeline(clientX) {
    if (!frames.length) return;
    const canvas = document.getElementById('timeline-canvas');
    const rect   = canvas.getBoundingClientRect();
    const x      = Math.max(0, Math.min(rect.width, clientX - rect.left));
    const t0 = new Date(frames[0][0]).getTime();
    const t1 = new Date(frames[frames.length - 1][0]).getTime();
    const target = t0 + (x / rect.width) * (t1 - t0);
    let lo = 0, hi = frames.length - 1;
    while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (new Date(frames[mid][0]).getTime() < target) lo = mid + 1; else hi = mid;
    }
    frameIndex = lo;
    renderFrame(frames[frameIndex], frameIndex > 0 ? frames[frameIndex - 1] : null, 100);
}

let tlDragging = false;
const tlCanvas = document.getElementById('timeline-canvas');
tlCanvas.addEventListener('mousedown', e => { tlDragging = true; scrubTimeline(e.clientX); });
document.addEventListener('mousemove', e => { if (tlDragging) scrubTimeline(e.clientX); });
document.addEventListener('mouseup', () => { tlDragging = false; });
// Hover preview (only when not dragging). Store the position so the bubble
// survives playback redraws instead of flickering.
tlCanvas.addEventListener('mousemove', e => {
    if (tlDragging || !frames.length) return;
    _tlHoverX = e.clientX - tlCanvas.getBoundingClientRect().left;
    drawTimeline();
});
tlCanvas.addEventListener('mouseleave', () => { _tlHoverX = null; if (frames.length) drawTimeline(); });
tlCanvas.addEventListener('touchstart', e => { scrubTimeline(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
tlCanvas.addEventListener('touchmove',  e => { scrubTimeline(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
window.addEventListener('resize', () => drawTimeline());

// Mouse-wheel scrolls the date wheel
document.getElementById('date-wheel').addEventListener('wheel', e => {
    e.preventDefault();
    const idx = allDates.indexOf(selectedDate);
    const next = idx + (e.deltaY > 0 ? 1 : -1);
    if (next >= 0 && next < allDates.length) {
        selectedDate = allDates[next];
        renderWheel();
        loadDate(selectedDate);
    }
}, { passive: false });

function startPlayback() {
    const btn = document.getElementById('play-btn');
    playing = true; btn.textContent = '⏸';
    playInterval = setInterval(() => {
        if (frameIndex >= frames.length - 1) {
            clearInterval(playInterval); playing = false;
            btn.textContent = '▶'; return;
        }
        const prev = frames[frameIndex++];
        renderFrame(frames[frameIndex], prev, playDur);
    }, playMs);
}

document.getElementById('play-btn').addEventListener('click', () => {
    const btn = document.getElementById('play-btn');
    if (playing) {
        clearInterval(playInterval); playing = false;
        btn.textContent = '▶';
    } else {
        startPlayback();
    }
});

function updateSpeedCaption(btn) {
    document.getElementById('speed-caption').textContent = btn.dataset.cap || '';
}
document.getElementById('speed-group').addEventListener('click', e => {
    const btn = e.target.closest('.spd');
    if (!btn) return;
    document.querySelectorAll('.spd').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    playMs  = parseInt(btn.dataset.ms);
    playDur = parseInt(btn.dataset.dur);
    updateSpeedCaption(btn);
    // Restart interval if already playing
    if (playing) { clearInterval(playInterval); startPlayback(); }
});
// Initialise the caption from the default-active gear
updateSpeedCaption(document.querySelector('#speed-group .spd.active'));

// ── Stop label styles ──────────────────────────────────────────────────
const STOP_LABEL_STYLES = {
    A: {  // Colored pill badges: white text on line-color halo blob
        dot:   { 'circle-radius': 6, 'circle-color': '#fff', 'circle-stroke-width': 3, 'circle-stroke-color': ['get','color'] },
        field: ['get','name'],
        layout: { 'text-size': ['interpolate',['linear'],['zoom'],11,11,14,14], 'text-font': ['Inter Medium','Open Sans Regular','Arial Unicode MS Bold'], 'text-max-width': 10 },
        paint:  { 'text-color': '#fff', 'text-halo-color': ['get','color'], 'text-halo-width': 4 }
    },
    B: {  // Floating white card: dark text on opaque white halo
        dot:   { 'circle-radius': 5, 'circle-color': '#fff', 'circle-stroke-width': 2.5, 'circle-stroke-color': ['get','color'] },
        field: ['get','name'],
        layout: { 'text-size': ['interpolate',['linear'],['zoom'],11,11,14,13], 'text-font': ['Inter Medium','Open Sans Regular','Arial Unicode MS Regular'], 'text-max-width': 10 },
        paint:  { 'text-color': '#111', 'text-halo-color': 'rgba(255,255,255,0.97)', 'text-halo-width': 4 }
    },
    C: {  // Cartographic: nothing when zoomed out, line-coloured dots + labels at zoom ≥ 13
        dot:   { 'circle-radius': ['step',['zoom'],0,13,4], 'circle-color': ['get','color'],
                 'circle-stroke-width': ['step',['zoom'],0,13,1.5], 'circle-stroke-color': '#fff' },
        field: ['step',['zoom'],'',13,['get','name']],
        layout: { 'text-size': ['interpolate',['linear'],['zoom'],13,11,16,14], 'text-font': ['Inter Medium','Open Sans Regular','Arial Unicode MS Regular'], 'text-max-width': 10 },
        paint:  { 'text-color': ['get','color'], 'text-halo-width': 0, 'text-halo-color': 'rgba(0,0,0,0)' }
    },
    D: {  // Big dots only — labels appear at zoom ≥ 13
        dot:   { 'circle-radius': ['interpolate',['linear'],['zoom'],10,4,13,8,15,10], 'circle-color': '#fff', 'circle-stroke-width': 3, 'circle-stroke-color': ['get','color'] },
        field: ['step',['zoom'],'',13,['get','name']],
        layout: { 'text-size': ['interpolate',['linear'],['zoom'],13,11,15,14], 'text-font': ['Inter Medium','Open Sans Regular','Arial Unicode MS Regular'], 'text-max-width': 10 },
        paint:  { 'text-color': '#111', 'text-halo-color': 'rgba(255,255,255,0.97)', 'text-halo-width': 3 }
    },
    DC: { // D dots + C cartographic labels at zoom ≥ 13
        dot:   { 'circle-radius': ['interpolate',['linear'],['zoom'],10,4,13,8,15,10], 'circle-color': '#fff', 'circle-stroke-width': 3, 'circle-stroke-color': ['get','color'] },
        field: ['step',['zoom'],'',13,['get','name']],
        layout: { 'text-size': ['interpolate',['linear'],['zoom'],13,11,15,14], 'text-font': ['Inter Medium','Open Sans Regular','Arial Unicode MS Regular'], 'text-max-width': 10 },
        paint:  { 'text-color': '#1a1a1a', 'text-halo-color': ['get','color'], 'text-halo-width': 2 }
    },
    E: { // Line only — no dots, no labels
        dot:   { 'circle-radius': 0, 'circle-color': 'rgba(0,0,0,0)', 'circle-stroke-width': 0, 'circle-stroke-color': 'rgba(0,0,0,0)' },
        field: '',
        layout: { 'text-size': 0, 'text-font': ['Inter Medium','Open Sans Regular','Arial Unicode MS Regular'], 'text-max-width': 0 },
        paint:  { 'text-color': 'rgba(0,0,0,0)', 'text-halo-color': 'rgba(0,0,0,0)', 'text-halo-width': 0 }
    }
};

function applyStopStyle(key) {
    if (!map.getLayer('stops-dot') || !map.getLayer('stop-labels')) return;
    const s = STOP_LABEL_STYLES[key];
    Object.entries(s.dot).forEach(([p, v]) => map.setPaintProperty('stops-dot', p, v));
    // Enforce data-driven perpendicular placement — clears any variable-anchor from prior state
    map.setLayoutProperty('stop-labels', 'text-variable-anchor', null);
    map.setLayoutProperty('stop-labels', 'text-radial-offset', null);
    map.setLayoutProperty('stop-labels', 'text-anchor', ['get', 'anchor']);
    map.setLayoutProperty('stop-labels', 'text-offset', [['get', 'offset_x'], ['get', 'offset_y']]);
    map.setLayoutProperty('stop-labels', 'text-field', s.field);
    Object.entries(s.layout).forEach(([p, v]) => map.setLayoutProperty('stop-labels', p, v));
    Object.entries(s.paint).forEach(([p, v]) => map.setPaintProperty('stop-labels', p, v));
}

// ── Motion accent (comet trail) ──────────────────────────────────────────
function applyMotionMode(mode) {
    cfgMotion = mode;
    const set = (id, on) => { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', on ? 'visible' : 'none'); };
    // Comet uses glow + core; leading glow uses glow only.
    const lineOn = mode === 'comet' || mode === 'glow';
    set('trail-red-glow',  lineOn);  set('trail-green-glow',  lineOn);
    set('trail-red-core',  mode === 'comet'); set('trail-green-core', mode === 'comet');
    set('m-halo',  mode === 'halo'  || mode === 'combo');
    set('m-chev',  mode === 'chev'  || mode === 'combo');
    set('m-pulse', mode === 'pulse');
    // Clear sources so nothing lingers when switching modes.
    const EMPTY = { type: 'FeatureCollection', features: [] };
    for (const s of ['trail-red', 'trail-green', 'm-halo', 'm-chev', 'm-pulse'])
        map.getSource(s)?.setData(EMPTY);
    map.triggerRepaint();
}

// ── Map styles ──────────────────────────────────────────────────────────
const _OMT = s => `https://raw.githubusercontent.com/openmaptiles/${s}/master/style.json`;

async function applyStyle(d, index) {
    isStandardStyle = !!d.std;
    // Theme the HTML overlays (edge vignette, date label, timeline) for the dark map.
    document.body.classList.toggle('dark', d.key === 'dark');
    if (typeof frames !== 'undefined' && frames.length) drawTimeline();
    const lb = document.getElementById('loading-bar'), lt = document.getElementById('loading-text');
    lb.style.display = ''; lt.style.display = '';
    setProgress(15, `Loading style: ${d.name}…`);
    try {
        if (d.url) {
            map.setStyle(d.url);
        } else {
            const res = await fetch(d.json);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            let txt = await res.text();
            txt = txt.split('{key}').join(MAPTILER_KEY);
            map.setStyle(JSON.parse(txt));
        }
        setProgress(100, `Style: ${d.name}`);
        setTimeout(() => { lb.style.display = 'none'; lt.style.display = 'none'; }, 700);
    } catch (err) {
        setProgress(0, `⚠ ${d.name}: ${err.message}`);
    }
}

// ── Settings panel (speed + map style) ─────────────────────────────────
// Three user-facing map styles, reusing applyStyle().
// All three are OpenMapTiles JSON styles (mercator, classic GL) so the custom
// Three.js tram layer renders identically on each. Mapbox's own v3 styles
// (light-v11/dark-v11) break custom-layer rendering, so we use Positron / Dark
// Matter — the equivalent light/dark CARTO basemaps — instead.
const MAP_STYLES = [
    { key: 'standard', label: 'Standard', name: 'Standard', json: _OMT('klokantech-basic-gl-style'),
      img: 'standard.png' },
    { key: 'light',    label: 'Light',    name: 'Light',    json: _OMT('positron-gl-style'),
      img: 'light.png' },
    { key: 'dark',     label: 'Dark',     name: 'Dark',     json: _OMT('dark-matter-gl-style'),
      img: 'dark.png' },
];
let cfgMapStyle = 'standard';   // matches the Klokantech Basic default

function buildMapStyleCards() {
    document.getElementById('mapstyle-cards').innerHTML = MAP_STYLES.map(s =>
        `<div class="ms-card${s.key === cfgMapStyle ? ' active' : ''}" data-key="${s.key}" title="${s.label}">
            <div class="ms-thumb" style="background-image:url(${s.img})"></div>
        </div>`).join('');
}
function syncMapStyleCards() {
    document.querySelectorAll('.ms-card').forEach(c =>
        c.classList.toggle('active', c.dataset.key === cfgMapStyle));
}
document.getElementById('mapstyle-cards').addEventListener('click', e => {
    const card = e.target.closest('.ms-card');
    if (!card) return;
    cfgMapStyle = card.dataset.key;
    syncMapStyleCards();
    applyStyle(MAP_STYLES.find(s => s.key === cfgMapStyle), 0);
});
buildMapStyleCards();

// Gear toggle + click-outside to close
const _setBtn = document.getElementById('settings-btn');
const _setPanel = document.getElementById('settings-panel');
_setBtn.addEventListener('click', e => {
    e.stopPropagation();
    const open = _setPanel.classList.toggle('open');
    _setBtn.classList.toggle('open', open);
});
document.addEventListener('click', e => {
    if (!_setPanel.contains(e.target) && e.target !== _setBtn) {
        _setPanel.classList.remove('open'); _setBtn.classList.remove('open');
    }
});
