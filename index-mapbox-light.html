//   omt     → real OpenMapTiles style.json with {key} → MapTiler key
//   legacy  → community styles whose upstream tilesets are deprecated/private
//             (listed for completeness; may render blank/partial)
const _OMT = s => `https://raw.githubusercontent.com/openmaptiles/${s}/master/style.json`;
const _RAW = 'https://raw.githubusercontent.com';
const EXTRA_STYLES = [
    { g: 'Mapbox',      name: 'Standard',            std: true,  url: 'mapbox://styles/mapbox/standard' },
    { g: 'Mapbox',      name: 'Standard Satellite',  std: true,  url: 'mapbox://styles/mapbox/standard-satellite' },
    { g: 'Mapbox',      name: 'Streets',             url: 'mapbox://styles/mapbox/streets-v12' },
    { g: 'Mapbox',      name: 'Outdoors',            url: 'mapbox://styles/mapbox/outdoors-v12' },
    { g: 'Mapbox',      name: 'Light',               url: 'mapbox://styles/mapbox/light-v11' },
    { g: 'Mapbox',      name: 'Dark',                url: 'mapbox://styles/mapbox/dark-v11' },
    { g: 'Mapbox',      name: 'Satellite',           url: 'mapbox://styles/mapbox/satellite-v9' },
    { g: 'Mapbox',      name: 'Satellite Streets',   url: 'mapbox://styles/mapbox/satellite-streets-v12' },
    { g: 'Mapbox',      name: 'Navigation Day',      url: 'mapbox://styles/mapbox/navigation-day-v1' },
    { g: 'Mapbox',      name: 'Navigation Night',    url: 'mapbox://styles/mapbox/navigation-night-v1' },

    { g: 'OpenMapTiles', name: 'Positron',           omt: true, json: _OMT('positron-gl-style') },
    { g: 'OpenMapTiles', name: 'Dark Matter',        omt: true, json: _OMT('dark-matter-gl-style') },
    { g: 'OpenMapTiles', name: 'OSM Bright',         omt: true, json: _OMT('osm-bright-gl-style') },
    { g: 'OpenMapTiles', name: 'Toner',              omt: true, json: _OMT('toner-gl-style') },
    { g: 'OpenMapTiles', name: 'Fiord Color',        omt: true, json: _OMT('fiord-color-gl-style') },
    { g: 'OpenMapTiles', name: 'Klokantech Basic',   omt: true, json: _OMT('klokantech-basic-gl-style') },
    { g: 'OpenMapTiles', name: 'Klokantech 3D',      omt: true, json: _OMT('klokantech-3d-gl-style') },
    { g: 'OpenMapTiles', name: 'Klokantech Terrain', omt: true, json: _OMT('klokantech-terrain-gl-style') },
    { g: 'OpenMapTiles', name: 'OSM Liberty',        omt: true, json: `${_RAW}/lukasmartinelli/osm-liberty/gh-pages/style.json` },

    { g: 'Community (legacy)', name: 'Neon',               json: `${_RAW}/NatEvatt/awesome-mapbox-gl-styles/master/styles/Neon/style.json` },
    { g: 'Community (legacy)', name: 'Swiss Ski',          json: `${_RAW}/mapbox/mapbox-gl-swiss-ski-style/master/cij1zoclj002y8rkkdjl69psd.json` },
    { g: 'Community (legacy)', name: 'Vintage',            json: `${_RAW}/mapbox/mapbox-gl-vintage-style/master/cif5p01n202nisaktvljx9mv3.json` },
    { g: 'Community (legacy)', name: 'Whaam',              json: `${_RAW}/mapbox/mapbox-gl-whaam-style/master/cii8323c8004w0nlvtss3dbm2.json` },
];

function buildStylePanel() {
    let html = '', lastG = null;
    const haveKey = MAPTILER_KEY && MAPTILER_KEY !== 'YOUR_' + 'MAPTILER_KEY';
    EXTRA_STYLES.forEach((d, i) => {
        if (d.g !== lastG) {
            html += `<div class="sp-group">${d.g}</div>`;
            if (d.g === 'OpenMapTiles' && !haveKey)
                html += `<div class="sp-note">⚠ add MAPTILER_KEY to .env to load these</div>`;
            if (d.g === 'Community (legacy)')
                html += `<div class="sp-note">upstream tilesets deprecated — may be blank</div>`;
            lastG = d.g;
        }
        html += `<div class="sp-row${d.name === 'Klokantech Basic' ? ' active' : ''}" data-i="${i}">${d.name}</div>`;
    });
    document.getElementById('sp-list').innerHTML = html;
}

function syncStylePanel(activeIndex) {
    document.querySelectorAll('.sp-row').forEach(r =>
        r.classList.toggle('active', +r.dataset.i === activeIndex));
}

async function applyStyle(d, index) {
    isStandardStyle = !!d.std;
    const lb = document.getElementById('loading-bar'), lt = document.getElementById('loading-text');
    lb.style.display = ''; lt.style.display = '';
    setProgress(15, `Loading style: ${d.name}…`);
    try {
        if (d.url) {
            map.setStyle(d.url);
        } else {
            const res = await fetch(d.json);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            let txt = await res.text();
            txt = txt.split('{key}').join(MAPTILER_KEY);
            map.setStyle(JSON.parse(txt));
        }
        setProgress(100, `Style: ${d.name}`);
        setTimeout(() => { lb.style.display = 'none'; lt.style.display = 'none'; }, 700);
    } catch (err) {
        setProgress(0, `⚠ ${d.name}: ${err.message}`);
    }
}

document.getElementById('sp-title').addEventListener('click', () => {
    document.getElementById('sp-body').classList.toggle('open');
    document.getElementById('sp-chevron').classList.toggle('open');
});
document.getElementById('sp-list').addEventListener('click', e => {
    const row = e.target.closest('.sp-row');
    if (!row) return;
    const i = +row.dataset.i;
    syncStylePanel(i);
    applyStyle(EXTRA_STYLES[i], i);
});
buildStylePanel();
