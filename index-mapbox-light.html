<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luas 3D Replay</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <script src="three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; }
        #map { position: fixed; inset: 0; }

        #controls {
            position: fixed; top: 16px; left: 16px; z-index: 10;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(0,0,0,0.10);
            border-radius: 10px; padding: 16px 20px; min-width: 310px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
        }
        h1 { font-size: 15px; color: #c0392b; margin-bottom: 12px; font-weight: 700; letter-spacing: 0.01em; }
        .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
        label { font-size: 12px; color: #666; }
        select {
            background: #f4f4f6; color: #222; border: 1px solid rgba(0,0,0,0.14);
            border-radius: 5px; padding: 4px 8px; font-size: 12px;
        }
        button {
            border: none; border-radius: 5px; padding: 6px 16px;
            cursor: pointer; font-size: 12px; font-weight: 500;
        }
        #load-btn  { background: #c0392b; color: white; }
        #load-btn:hover { background: #a93226; }
        #load-btn:disabled { background: #ddd; color: #aaa; cursor: default; }
        #play-btn  { background: #e8f5e9; color: #2e7d32; }
        #play-btn:hover { background: #c8e6c9; }
        #play-btn:disabled { background: #eee; color: #aaa; cursor: default; }
        #slider-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        #slider { flex: 1; accent-color: #c0392b; }
        #time-display { font-size: 12px; color: #555; min-width: 65px; font-variant-numeric: tabular-nums; }
        #stats { font-size: 11px; color: #999; margin-top: 4px; }
        #speed-group { display: flex; background: #ebebf0; border-radius: 16px; padding: 2px; gap: 1px; margin-left: 4px; }
        .spd { border: none; background: transparent; border-radius: 13px; padding: 4px 9px; font-size: 11px; cursor: pointer; color: #666; font-weight: 500; }
        .spd.active { background: #c0392b; color: #fff; }
        #loading-bar { height: 3px; background: #eee; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        #loading-fill { height: 100%; background: #c0392b; width: 0%; transition: width 0.3s; }
        #loading-text { font-size: 11px; color: #aaa; margin-top: 4px; }

        #legend {
            position: fixed; bottom: 32px; left: 16px; z-index: 10;
            background: rgba(255, 255, 255, 0.96); border: 1px solid rgba(0,0,0,0.10);
            border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #555;
            box-shadow: 0 2px 12px rgba(0,0,0,0.10);
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
        .swatch { width: 28px; height: 4px; border-radius: 2px; }

        #hint {
            position: fixed; bottom: 32px; right: 16px; z-index: 10;
            font-size: 11px; color: #999;
            background: rgba(255,255,255,0.92); border: 1px solid rgba(0,0,0,0.08);
            padding: 5px 9px; border-radius: 5px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        }

        #config-panel {
            position: fixed; top: 16px; right: 48px; z-index: 10;
            background: rgba(255,255,255,0.97); border: 1px solid rgba(0,0,0,0.10);
            border-radius: 12px; padding: 14px 18px; min-width: 340px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
        }
        .config-title {
            font-size: 13px; font-weight: 700; color: #222;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; user-select: none; margin-bottom: 0;
        }
        .config-title .chevron {
            font-size: 10px; color: #aaa; transition: transform 0.2s;
            display: inline-block;
        }
        .config-title .chevron.open { transform: rotate(180deg); }
        #config-body { overflow: hidden; transition: max-height 0.25s ease, margin-top 0.25s ease; max-height: 0; margin-top: 0; }
        #config-body.open { max-height: 400px; margin-top: 12px; }
        .config-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .config-row:last-child { margin-bottom: 0; }
        .config-label { font-size: 12px; color: #555; min-width: 90px; }
        .toggle-group { display: flex; background: #ebebf0; border-radius: 20px; padding: 3px; gap: 2px; }
        .tog {
            border: none; background: transparent; border-radius: 16px;
            padding: 5px 13px; font-size: 12px; cursor: pointer; color: #555;
            transition: background 0.15s, color 0.15s; white-space: nowrap;
        }
        .tog.active { background: #5a5fcf; color: #fff; font-weight: 600; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="controls">
    <h1>🚊 Luas 3D Replay</h1>
    <div class="row">
        <label>Date:</label>
        <select id="date-select"><option>Loading…</option></select>
        <label>Hour:</label>
        <select id="hour-select"></select>
    </div>
    <div class="row">
        <button id="load-btn" disabled>Load</button>
        <button id="play-btn" disabled>▶ Play</button>
        <div id="speed-group">
            <button class="spd active" data-ms="400" data-dur="280">½×</button>
            <button class="spd" data-ms="200" data-dur="180">1×</button>

    <div id="loading-bar"><div id="loading-fill"></div></div>

</div>

<div id="legend">
    <div class="legend-item"><div class="swatch" style="background:#ff2020"></div> Red Line</div>
    <div class="legend-item"><div class="swatch" style="background:#16A34A"></div> Green Line</div>
</div>

<div id="hint">Drag · Ctrl+drag to tilt · Scroll to zoom</div>

<div id="config-panel">
    <div class="config-title" id="config-toggle">
        Preview configurations
        <span class="chevron" id="config-chevron">▼</span>
    </div>
    <div id="config-body">
    <div class="config-row">
        <span class="config-label">Basemap</span>
        <div class="toggle-group" id="basemap-group">
            <button class="tog active" data-value="standard">Standard</button>
            <button class="tog" data-value="standard-satellite">Standard satellite</button>
        </div>
    </div>
    <div class="config-row">
        <span class="config-label">Color themes</span>
        <div class="toggle-group" id="theme-group">
            <button class="tog" data-value="default">Default</button>
            <button class="tog" data-value="faded">Faded</button>
            <button class="tog active" data-value="monochrome">Monochrome</button>
        </div>
    </div>
    <div class="config-row">
        <span class="config-label">Light presets</span>
        <div class="toggle-group" id="light-group">
            <button class="tog" data-value="dawn">Dawn</button>
            <button class="tog active" data-value="day">Day</button>
            <button class="tog" data-value="dusk">Dusk</button>
            <button class="tog" data-value="night">Night</button>
        </div>
    </div>
    <div class="config-row">
        <span class="config-label">POI labels</span>
        <div class="toggle-group" id="poi-group">
            <button class="tog active" data-value="show">Show</button>
            <button class="tog" data-value="hide">Hide</button>
        </div>
    </div>
    <div class="config-row">
        <span class="config-label">Tram head</span>
        <div class="toggle-group" id="head-group">
            <button class="tog" data-value="basic">Basic</button>
            <button class="tog active" data-value="distinct">Distinct ◉</button>
        </div>
    </div>
    <div class="config-row">
        <span class="config-label">Stop labels</span>
        <div class="toggle-group" id="stop-style-group">
            <button class="tog" data-value="A">A · Pill</button>
            <button class="tog" data-value="B">B · Card</button>
            <button class="tog" data-value="C">C · Map</button>
            <button class="tog" data-value="D">D · Dots</button>
            <button class="tog active" data-value="DC">D+C</button>
        </div>
    </div>
    </div><!-- /config-body -->
</div>

<script>
const MAPBOX_TOKEN = 'YOUR_MAPBOX_TOKEN';
const API = '/luas-api';

mapboxgl.accessToken = MAPBOX_TOKEN;

// ── Config state ───────────────────────────────────────────────────────
let cfgBasemap = 'standard';
let cfgTheme   = 'monochrome';
let cfgLight   = 'day';
let isStandardStyle = true;  // false when light-v11 is active for monochrome
let cfgPOI       = 'show';      // 'show' | 'hide'
let cfgHead      = 'distinct';  // 'basic' | 'distinct'
let cfgStopStyle = 'DC';        // A | B | C | D | DC
let stopsCache      = null;
let routesCache     = null;
let snappedCache    = null;
const routeIndexes  = {};   // routeKey → { coords, cumDist[], totalDist }
const stopRouteProj = {};   // stop_abv → { dist, routeKey }

async function apiFetch(path) {
    const ctrl = new AbortController();
    const id = setTimeout(() => ctrl.abort(), 20000);
    try {
        const r = await fetch(API + path, { signal: ctrl.signal });
        clearTimeout(id);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
    } catch (e) {
        clearTimeout(id);
        const msg = e.name === 'AbortError' ? 'API timed out — is the server running?' : e.message;
        setProgress(0, '⚠ ' + msg);
        throw e;
    }
}

// ── Map ────────────────────────────────────────────────────────────────
const _initialStyle = cfgTheme === 'monochrome'
    ? (isStandardStyle = false, 'mapbox://styles/mapbox/light-v11')
    : 'mapbox://styles/mapbox/standard';
const map = new mapboxgl.Map({
    container: 'map',
    style: _initialStyle,
    center: [-6.2750, 53.3420],
    zoom: 12.2,
    pitch: 58,
    bearing: -15,
    antialias: true
});

map.addControl(new mapboxgl.NavigationControl({ visualizePitch: true }), 'top-right');

// ── Progress ───────────────────────────────────────────────────────────
function setProgress(pct, text) {
    document.getElementById('loading-fill').style.width = pct + '%';
    document.getElementById('loading-text').textContent = text;
}

// ── Replay state ───────────────────────────────────────────────────────
let stops = [], frames = [], frameIndex = 0;
let playing = false, playInterval = null, animFrameId = null;
let playMs = 400, playDur = 280;   // interval and animation duration (ms)

function lerp(a, b, t) { return a + (b - a) * t; }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

// ── Route-snapping helpers ─────────────────────────────────────────────
function buildRouteIndex(coords) {
    const cumDist = [0];
    for (let i = 1; i < coords.length; i++) {
        const cosLat = Math.cos(coords[i][1] * Math.PI / 180);
        const dx = (coords[i][0] - coords[i-1][0]) * cosLat * 111320;
        const dy = (coords[i][1] - coords[i-1][1]) * 111320;
        cumDist.push(cumDist[i-1] + Math.sqrt(dx*dx + dy*dy));
    }
    return { coords, cumDist, totalDist: cumDist[cumDist.length - 1] };
}

function posAtDist(dist, idx) {
    const { coords, cumDist } = idx;
    if (dist <= cumDist[0]) return coords[0];
    if (dist >= idx.totalDist) return coords[coords.length - 1];
    let lo = 0, hi = cumDist.length - 1;
    while (lo < hi - 1) { const mid = (lo + hi) >> 1; if (cumDist[mid] <= dist) lo = mid; else hi = mid; }
    const t = (dist - cumDist[lo]) / (cumDist[hi] - cumDist[lo]);
    return [lerp(coords[lo][0], coords[hi][0], t), lerp(coords[lo][1], coords[hi][1], t)];
}

function projectOntoRoute(lon, lat, idx) {
    const { coords, cumDist } = idx;
    let bestD2 = Infinity, bestDist = 0;
    for (let i = 0; i < coords.length - 1; i++) {
        const ax = coords[i][0], ay = coords[i][1];
        const bx = coords[i+1][0], by = coords[i+1][1];
        const dx = bx - ax, dy = by - ay;
        const len2 = dx*dx + dy*dy;
        const tSeg = len2 > 0 ? Math.max(0, Math.min(1, ((lon-ax)*dx + (lat-ay)*dy) / len2)) : 0;
        const px = ax + tSeg*dx, py = ay + tSeg*dy;
        const d2 = (lon-px)*(lon-px) + (lat-py)*(lat-py);
        if (d2 < bestD2) { bestD2 = d2; bestDist = cumDist[i] + tSeg * (cumDist[i+1] - cumDist[i]); }
    }
    return bestDist;
}

function routeSubsegment(d1, d2, idx) {
    const { coords, cumDist } = idx;
    const lo = Math.min(d1, d2), hi = Math.max(d1, d2);
    const seg = [posAtDist(d1, idx)];
    for (let i = 0; i < cumDist.length; i++) {
        if (cumDist[i] > lo && cumDist[i] < hi) seg.push(coords[i]);
    }
    seg.push(posAtDist(d2, idx));
    if (d1 > d2) seg.reverse();
    return seg;
}

function buildAllStopProjections() {
    stops.forEach(s => {
        if (s.line === 'Green') {
            const idx = routeIndexes['Green'];
            if (idx) stopRouteProj[s.stop_abv] = { dist: projectOntoRoute(s.longitude, s.latitude, idx), routeKey: 'Green' };
        } else {
            const idxT = routeIndexes['Red-Tallaght'];
            const idxS = routeIndexes['Red-Saggart'];
            if (!idxT || !idxS) return;
            const dT = projectOntoRoute(s.longitude, s.latitude, idxT);
            const dS = projectOntoRoute(s.longitude, s.latitude, idxS);
            const pT = posAtDist(dT, idxT), pS = posAtDist(dS, idxS);
            const distT = Math.hypot(pT[0]-s.longitude, pT[1]-s.latitude);
            const distS = Math.hypot(pS[0]-s.longitude, pS[1]-s.latitude);
            stopRouteProj[s.stop_abv] = distT <= distS
                ? { dist: dT, routeKey: 'Red-Tallaght' }
                : { dist: dS, routeKey: 'Red-Saggart' };
        }
    });
}

// ── Three.js 3D tram custom layer ─────────────────────────────────────
// The scene uses X=east, Z=south (metres from Dublin centre), Y=up.
// Mapbox's render matrix transforms Mercator coords → clip space.
// We combine it with a world→Mercator matrix so Three.js objects placed
// in metre-offset coordinates appear at the correct geographic positions.
const _CTR_LON = -6.275, _CTR_LAT = 53.342;
let _mcRef = null; // MercatorCoordinate of scene origin

// One articulated car (8 m long). isFirst = true adds a nose cap at the +X end.
function makeTramSegment(lineHex, isFirst) {
    const g = new THREE.Group();
    const box = (w, h, d, hex, x, y, z) => {
        const m = new THREE.Mesh(
            new THREE.BoxGeometry(w, h, d),
            new THREE.MeshLambertMaterial({ color: hex })
        );
        m.position.set(x, y, z);
        g.add(m);
    };
    box(8,   3.2,  2.8,  0xCDD2D5,  0,    1.6,  0);  // body
    box(6.4, 1.4,  2.82, 0x1E2830,  0,    2.4,  0);  // windows
    box(8,   0.7,  2.82, lineHex,   0,    0.7,  0);  // stripe
    box(7,   0.4,  2.6,  0xE8ECEE,  0,    3.2,  0);  // roof
    if (isFirst) box(0.8, 3.2, 2.8, 0xA8ADB0, 4.4, 1.6, 0); // nose
    return g;
}

const tramLayer = {
    id: 'tram-3d',
    type: 'custom',
    renderingMode: '3d',
    _objs: new Map(),    // key → [seg0..seg4]
    _scene: null, _camera: null, _renderer: null, _map: null,
    _active: true,

    onAdd(map, gl) {
        this._map = map;
        this._camera = new THREE.Camera();
        this._scene  = new THREE.Scene();

        // Lighting: warm sun from upper-right + cool fill from below
        this._scene.add(new THREE.AmbientLight(0xffffff, 0.75));
        const sun = new THREE.DirectionalLight(0xfff4e0, 1.6);
        sun.position.set(0.4, 1, 0.6).normalize();
        this._scene.add(sun);
        const fill = new THREE.DirectionalLight(0xc0d8ff, 0.35);
        fill.position.set(-0.4, -0.5, -0.5).normalize();
        this._scene.add(fill);

        this._renderer = new THREE.WebGLRenderer({
            canvas: map.getCanvas(), context: gl, antialias: true
        });
        this._renderer.autoClear = false;

        _mcRef = mapboxgl.MercatorCoordinate.fromLngLat([_CTR_LON, _CTR_LAT], 0);
    },

    onRemove() {
        for (const segs of this._objs.values())
            segs.forEach(s => { this._scene?.remove(s); s.traverse(c => { c.geometry?.dispose(); c.material?.dispose(); }); });
        this._renderer?.dispose();
        this._scene = this._camera = this._renderer = null;
        this._objs.clear();
    },

    // Scale so each 8 m car appears ~10 px long on screen
    _scaleAt(zoom) {
        const mpp = (156543.03392 * Math.cos(_CTR_LAT * Math.PI / 180)) / Math.pow(2, zoom);
        return (10 * mpp) / 8;
    },


    updateTrams(tramPositions) {
        if (!this._scene || !this._active) return;
        const s   = this._scaleAt(this._map.getZoom());
        const cos = Math.cos(_CTR_LAT * Math.PI / 180);
        const N   = 5;      // number of articulated car segments
        const GAP = 9;      // metres between segment centres (8 m car + 1 m gap)

        // Remove trams that left the frame
        for (const [key, segs] of this._objs) {
            if (!tramPositions.has(key)) {
                segs.forEach(seg => {
                    this._scene.remove(seg);
                    seg.traverse(c => { c.geometry?.dispose(); c.material?.dispose(); });
                });
                this._objs.delete(key);
            }
        }

        for (const [key, { lon, lat, aheadLon, aheadLat, color, routeKey, routeDist, forward }] of tramPositions) {
            const lineHex = color === '#dd1122' ? 0xdd1122 : 0x16A34A;

            if (!this._objs.has(key)) {
                const segs = Array.from({ length: N }, (_, i) => {
                    const seg = makeTramSegment(lineHex, i === 0);
                    this._scene.add(seg);
                    return seg;
                });
                this._objs.set(key, segs);
            }
            const segs = this._objs.get(key);
            const idx  = routeKey ? routeIndexes[routeKey] : null;

            for (let i = 0; i < N; i++) {
                let sLon, sLat, aLon, aLat;

                if (idx && routeDist != null) {
                    // Walk i segments backward from the front along the snapped route
                    const d  = Math.max(0, Math.min(idx.totalDist, routeDist + (forward ? -i : i) * GAP));
                    const dA = Math.max(0, Math.min(idx.totalDist, d + (forward ? 4 : -4)));
                    [sLon, sLat] = posAtDist(d,  idx);
                    [aLon, aLat] = posAtDist(dA, idx);
                } else {
                    // Fallback: space segments in straight line using aheadLon/Lat
                    const dx = aheadLon - lon, dy = aheadLat - lat;
                    const len = Math.hypot(dx, dy) || 1e-9;
                    const deg = GAP * i / (111320 * cos);
                    sLon = lon - (dx / len) * deg;
                    sLat = lat - (dy / len) * deg * cos;
                    aLon = aheadLon; aLat = aheadLat;
                }

                segs[i].position.set(
                    (sLon - _CTR_LON) * cos * 111320,
                    0,
                    -(sLat - _CTR_LAT) * 111320
                );
                const bearing = Math.atan2(aLon - sLon, aLat - sLat);
                segs[i].rotation.y = Math.PI / 2 - bearing;
                segs[i].scale.setScalar(s);
            }
        }
        this._map.triggerRepaint();
    },

    setVisible(v) {
        this._active = v;
        if (this._scene) this._scene.visible = v;
        this._map?.triggerRepaint();
    },

    render(gl, args) {
        if (!_mcRef || !this._active || !this._renderer) return;

        // Mapbox v3 passes args object; older API passed the matrix array directly
        const mat = args?.projectionMatrix
            ?? args?.defaultProjectionData?.mainMatrix
            ?? (Array.isArray(args) || args instanceof Float32Array ? args : null);
        if (!mat) return;

        // l converts Three.js scene metres → Mapbox Mercator coordinates:
        //   translate to centre, scale metres→Mercator, flip Y (Mercator Y grows south,
        //   Three.js Y grows up), then tilt axes with RotationX so Three.js Y=up maps
        //   to Mercator Z=altitude.
        const ms = _mcRef.meterInMercatorCoordinateUnits();
        const l  = new THREE.Matrix4()
            .makeTranslation(_mcRef.x, _mcRef.y, _mcRef.z)
            .scale(new THREE.Vector3(ms, -ms, ms))
            .multiply(new THREE.Matrix4().makeRotationX(Math.PI / 2));

        this._camera.projectionMatrix = new THREE.Matrix4().fromArray(mat).multiply(l);
        this._renderer.resetState();
        this._renderer.render(this._scene, this._camera);
        this._map.triggerRepaint();
    }
};


function getTramMap(frameData) {
    const trams = new Map();
    frameData[1].forEach(row => {
        const s = stops.find(s => s.stop_abv === row.stop_abv);
        if (!s) return;
        const key = `${row.destination}-${row.direction}`;
        if (!trams.has(key) || trams.get(key).due_mins > row.due_mins) {
            const proj = stopRouteProj[row.stop_abv] || { dist: 0, routeKey: s.line === 'Green' ? 'Green' : 'Red-Tallaght' };
            trams.set(key, { ...row, stop_lat: s.latitude, stop_lon: s.longitude, line: s.line,
                routeDist: proj.dist, routeKey: proj.routeKey });
        }
    });
    return trams;
}

function buildFrames(data) {
    // Sort by timestamp, then merge observations within 20s of each frame's anchor
    // — the scraper polls Red and Green separately so their timestamps are offset
    const sorted = [...data].sort((a, b) => a.observed_at.localeCompare(b.observed_at));
    const frames = [];
    for (const row of sorted) {
        const t = new Date(row.observed_at).getTime();
        const last = frames[frames.length - 1];
        if (last && t - new Date(last[0]).getTime() <= 20000) {
            last[1].push(row);
        } else {
            frames.push([row.observed_at, [row]]);
        }
    }
    return frames;
}

function renderFrame(frameData, prevFrameData, duration = 180) {
    if (animFrameId) cancelAnimationFrame(animFrameId);
    const toMap = getTramMap(frameData);
    const fromMap = prevFrameData ? getTramMap(prevFrameData) : null;

    // Pre-compute travel direction (forward = increasing routeDist along route index).
    // With fromMap: infer from routeDist change.
    // First appearance: lookahead up to 4 frames to find next occurrence.
    const tramDirs = new Map();
    for (const [key, tram] of toMap) {
        if (fromMap?.has(key)) {
            tramDirs.set(key, tram.routeDist >= fromMap.get(key).routeDist);
        } else {
            let forward = true;
            for (let fi = frameIndex + 1; fi < Math.min(frameIndex + 4, frames.length); fi++) {
                const nextMap = getTramMap(frames[fi]);
                if (nextMap.has(key)) {
                    forward = nextMap.get(key).routeDist >= tram.routeDist;
                    break;
                }
            }
            tramDirs.set(key, forward);
        }
    }

    const start = performance.now();
    function tick(now) {
        const raw = Math.min((now - start) / duration, 1);
        const t = easeInOut(raw);

        const tramPositions = new Map();
        for (const [key, tram] of toMap) {
            let lon, lat, aheadLon, aheadLat, currentDist;
            const idx     = routeIndexes[tram.routeKey];
            const proj    = stopRouteProj[tram.stop_abv];
            const forward = tramDirs.get(key) ?? true;
            const step    = forward ? 40 : -40;

            if (fromMap?.has(key)) {
                const from = fromMap.get(key);
                const fromIdx = routeIndexes[from.routeKey];
                if (idx && fromIdx && from.routeKey === tram.routeKey) {
                    const d = lerp(from.routeDist, tram.routeDist, t);
                    currentDist = d;
                    [lon, lat] = posAtDist(d, idx);
                    const aD = Math.max(0, Math.min(idx.totalDist, d + step));
                    [aheadLon, aheadLat] = posAtDist(aD, idx);
                } else {
                    currentDist = proj?.dist ?? 0;
                    const fromProj = stopRouteProj[from.stop_abv];
                    const [toLon, toLat] = (idx && proj) ? posAtDist(proj.dist, idx) : [tram.stop_lon, tram.stop_lat];
                    const [frLon, frLat] = (fromIdx && fromProj) ? posAtDist(fromProj.dist, fromIdx) : [from.stop_lon, from.stop_lat];
                    lon = lerp(frLon, toLon, t);
                    lat = lerp(frLat, toLat, t);
                    aheadLon = lerp(frLon, toLon, Math.min(1, t + 0.1));
                    aheadLat = lerp(frLat, toLat, Math.min(1, t + 0.1));
                }
            } else {
                if (idx && proj) {
                    currentDist = proj.dist;
                    [lon, lat] = posAtDist(proj.dist, idx);
                    const aD = Math.max(0, Math.min(idx.totalDist, proj.dist + step));
                    [aheadLon, aheadLat] = posAtDist(aD, idx);
                } else {
                    currentDist = 0;
                    lon = tram.stop_lon; lat = tram.stop_lat;
                    aheadLon = lon + 0.001; aheadLat = lat;
                }
            }
            tramPositions.set(key, {
                lon, lat, aheadLon, aheadLat,
                color: tram.line === 'Red' ? '#dd1122' : '#16A34A',
                routeKey: tram.routeKey,
                routeDist: currentDist,
                forward
            });
        }
        tramLayer.updateTrams(tramPositions);

        document.getElementById('stats').textContent = `Trams: ${toMap.size}`;
        document.getElementById('time-display').textContent =
            new Date(frameData[0]).toLocaleTimeString('en-IE', { timeZone: 'Europe/Dublin' });

        if (raw < 1) animFrameId = requestAnimationFrame(tick);
    }
    animFrameId = requestAnimationFrame(tick);
}


// ── Map ready ──────────────────────────────────────────────────────────
map.on('style.load', async () => {

    if (isStandardStyle) {
        map.setConfigProperty('basemap', 'colorTheme',
            cfgTheme === 'monochrome' ? 'default' : cfgTheme);
        map.setConfigProperty('basemap', 'lightPreset', cfgLight);
    }

    setProgress(20, 'Fetching stops…');
    if (!stopsCache)   stopsCache   = await apiFetch('/api/stops');
    if (!routesCache)  routesCache  = await fetch('/routes.geojson').then(r => r.json());
    if (!snappedCache) snappedCache = await fetch('/routes-snapped.geojson').then(r => r.json());
    stops = stopsCache;

    // Build route indexes for snapping
    for (const f of snappedCache.features) {
        routeIndexes[f.properties.routeKey] = buildRouteIndex(f.geometry.coordinates);
    }
    buildAllStopProjections();

    // ── Routes (actual OSM track geometry) ─────────────────────────────
    const redFeature   = routesCache.features.find(f => f.properties.line === 'Red');
    const greenFeature = routesCache.features.find(f => f.properties.line === 'Green');

    for (const [id, feature, color] of [
        ['red-route',   redFeature,   '#ff2020'],
        ['green-route', greenFeature, '#16A34A']
    ]) {
        map.addSource(id, { type: 'geojson', data: feature });
        map.addLayer({ id: `${id}-core`, type: 'line', source: id,
            slot: 'top',
            layout: { 'line-cap': 'round', 'line-join': 'round' },
            paint: { 'line-color': color, 'line-width': 4.5, 'line-opacity': 1,
                     'line-emissive-strength': 1 }
        });
    }

    // ── Stops ──────────────────────────────────────────────────────────
    const stopGeoJSON = {
        type: 'FeatureCollection',
        features: stops.map(s => {
            const proj = stopRouteProj[s.stop_abv];
            const idx  = proj ? routeIndexes[proj.routeKey] : null;
            const [lon, lat] = (proj && idx) ? posAtDist(proj.dist, idx) : [s.longitude, s.latitude];

            // Compute label offset perpendicular (right-hand side) to the track direction.
            // This guarantees the label never crosses the track regardless of zoom/pan.
            const EM = 1.1;
            let offset_x = EM, offset_y = 0, anchor = 'left';
            if (proj && idx) {
                const d  = proj.dist;
                const aD = Math.min(d + 40, idx.totalDist);
                const bD = Math.max(d - 40, 0);
                const [aLon, aLat] = posAtDist(aD, idx);
                const [bLon, bLat] = posAtDist(bD, idx);
                const cos = Math.cos(lat * Math.PI / 180);
                const dx = (aLon - bLon) * cos; // east component of travel direction
                const dy = aLat - bLat;          // north component of travel direction
                const len = Math.hypot(dx, dy) || 1;
                // Right-hand perpendicular: rotate travel vector 90° clockwise
                // perp_east = dy/len,  perp_north = -dx/len
                // Map to Mapbox text-offset [screen_right, screen_down]:
                //   screen_right = perp_east,  screen_down = -perp_north = dx/len
                offset_x = +(dy / len * EM).toFixed(3);
                offset_y = +(dx / len * EM).toFixed(3);
                // Anchor: the text edge that faces the track
                if (Math.abs(offset_x) >= Math.abs(offset_y)) {
                    anchor = offset_x > 0 ? 'left' : 'right';
                } else {
                    anchor = offset_y > 0 ? 'top' : 'bottom';
                }
            }

            return {
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [lon, lat] },
                properties: { color: s.line === 'Red' ? '#ff2020' : '#16A34A', name: s.stop_name, offset_x, offset_y, anchor }
            };
        })
    };
    map.addSource('stops', { type: 'geojson', data: stopGeoJSON });
    map.addLayer({ id: 'stops-dot', type: 'circle', source: 'stops',
        slot: 'top',
        paint: {
            'circle-radius': 4,
            'circle-color': '#111',
            'circle-stroke-width': 2.5,
            'circle-stroke-color': ['get', 'color']
        }
    });
    map.addLayer({ id: 'stop-labels', type: 'symbol', source: 'stops',
        slot: 'top',
        minzoom: 11,
        layout: {
            'text-field': ['get', 'name'],
            'text-size': ['interpolate', ['linear'], ['zoom'], 11, 10, 13, 13, 15, 15],
            'text-anchor': ['get', 'anchor'],
            'text-offset': [['get', 'offset_x'], ['get', 'offset_y']],
            'text-max-width': 10,
            'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
            'text-allow-overlap': false,
            'text-ignore-placement': false
        },
        paint: {
            'text-color': '#fff',
            'text-halo-color': 'rgba(0,0,0,0.6)',
            'text-halo-width': 1.5
        }
    });

    applyStopStyle(cfgStopStyle);

    // ── Three.js 3D tram layer ───────────────────────────────────────
    map.addLayer(tramLayer);
    tramLayer.setVisible(cfgHead === 'distinct');

    setProgress(80, 'Loading dates…');
    await loadDates();
    loadHours();
    setProgress(100, 'Ready — pick a date and hour');
    setTimeout(() => {
        document.getElementById('loading-bar').style.display = 'none';
        document.getElementById('loading-text').style.display = 'none';
    }, 800);
    document.getElementById('load-btn').disabled = false;

    // Restore current frame after style reload (e.g. switching to monochrome)
    if (frames.length > 0) {
        renderFrame(frames[frameIndex], frameIndex > 0 ? frames[frameIndex - 1] : null, 0);
    }

});

// ── UI ─────────────────────────────────────────────────────────────────
async function loadDates() {
    const dates = await apiFetch('/api/dates');
    document.getElementById('date-select').innerHTML =
        dates.map(d => `<option value="${d}">${d}</option>`).join('');
}

function loadHours() {
    const sel = document.getElementById('hour-select');
    for (let h = 0; h < 24; h++)
        sel.innerHTML += `<option value="${h}">${String(h).padStart(2,'0')}:00</option>`;
    sel.value = 8;
}

document.getElementById('load-btn').addEventListener('click', async () => {
    const date = document.getElementById('date-select').value;
    const hour = document.getElementById('hour-select').value;
    const btn = document.getElementById('load-btn');
    btn.disabled = true; btn.textContent = 'Loading…';

    const data = await apiFetch(`/api/replay?date=${date}&hour=${hour}`);
    frames = buildFrames(data);
    frameIndex = 0;
    const slider = document.getElementById('slider');
    slider.max = frames.length - 1; slider.value = 0; slider.disabled = false;
    document.getElementById('play-btn').disabled = false;
    btn.disabled = false; btn.textContent = 'Load';
    if (frames.length > 0) renderFrame(frames[0], null, 0);
});

document.getElementById('slider').addEventListener('input', e => {
    frameIndex = parseInt(e.target.value);
    if (frames[frameIndex]) renderFrame(frames[frameIndex], frames[frameIndex - 1], 150);
});

function startPlayback() {
    const btn = document.getElementById('play-btn');
    playing = true; btn.textContent = '⏸ Pause';
    playInterval = setInterval(() => {
        if (frameIndex >= frames.length - 1) {
            clearInterval(playInterval); playing = false;
            btn.textContent = '▶ Play'; return;
        }
        const prev = frames[frameIndex++];
        document.getElementById('slider').value = frameIndex;
        renderFrame(frames[frameIndex], prev, playDur);
    }, playMs);
}

document.getElementById('play-btn').addEventListener('click', () => {
    const btn = document.getElementById('play-btn');
    if (playing) {
        clearInterval(playInterval); playing = false;
        btn.textContent = '▶ Play';
    } else {
        startPlayback();
    }
});

document.getElementById('speed-group').addEventListener('click', e => {
    const btn = e.target.closest('.spd');
    if (!btn) return;
    document.querySelectorAll('.spd').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    playMs  = parseInt(btn.dataset.ms);
    playDur = parseInt(btn.dataset.dur);
    // Restart interval if already playing
    if (playing) { clearInterval(playInterval); startPlayback(); }
});

// ── Stop label styles ──────────────────────────────────────────────────
const STOP_LABEL_STYLES = {
    A: {  // Colored pill badges: white text on line-color halo blob
        dot:   { 'circle-radius': 6, 'circle-color': '#fff', 'circle-stroke-width': 3, 'circle-stroke-color': ['get','color'] },
        field: ['get','name'],
        layout: { 'text-size': ['interpolate',['linear'],['zoom'],11,11,14,14], 'text-font': ['DIN Pro Bold','Arial Unicode MS Bold'], 'text-max-width': 10 },
        paint:  { 'text-color': '#fff', 'text-halo-color': ['get','color'], 'text-halo-width': 4 }
    },
    B: {  // Floating white card: dark text on opaque white halo
        dot:   { 'circle-radius': 5, 'circle-color': '#fff', 'circle-stroke-width': 2.5, 'circle-stroke-color': ['get','color'] },
        field: ['get','name'],
        layout: { 'text-size': ['interpolate',['linear'],['zoom'],11,11,14,13], 'text-font': ['DIN Pro Medium','Arial Unicode MS Regular'], 'text-max-width': 10 },
        paint:  { 'text-color': '#111', 'text-halo-color': 'rgba(255,255,255,0.97)', 'text-halo-width': 4 }
    },
    C: {  // Cartographic: line-colored text, no halo or background
        dot:   { 'circle-radius': 4, 'circle-color': ['get','color'], 'circle-stroke-width': 1.5, 'circle-stroke-color': '#fff' },
        field: ['get','name'],
        layout: { 'text-size': ['interpolate',['linear'],['zoom'],11,10,14,13], 'text-font': ['DIN Pro Medium','Arial Unicode MS Regular'], 'text-max-width': 10 },
        paint:  { 'text-color': ['get','color'], 'text-halo-width': 0, 'text-halo-color': 'rgba(0,0,0,0)' }
    },
    D: {  // Big dots only — labels appear at zoom ≥ 13
        dot:   { 'circle-radius': ['interpolate',['linear'],['zoom'],10,4,13,8,15,10], 'circle-color': '#fff', 'circle-stroke-width': 3, 'circle-stroke-color': ['get','color'] },
        field: ['step',['zoom'],'',13,['get','name']],
        layout: { 'text-size': ['interpolate',['linear'],['zoom'],13,11,15,14], 'text-font': ['DIN Pro Medium','Arial Unicode MS Regular'], 'text-max-width': 10 },
        paint:  { 'text-color': '#111', 'text-halo-color': 'rgba(255,255,255,0.97)', 'text-halo-width': 3 }
    },
    DC: { // D dots + C cartographic labels at zoom ≥ 13
        dot:   { 'circle-radius': ['interpolate',['linear'],['zoom'],10,4,13,8,15,10], 'circle-color': '#fff', 'circle-stroke-width': 3, 'circle-stroke-color': ['get','color'] },
        field: ['step',['zoom'],'',13,['get','name']],
        layout: { 'text-size': ['interpolate',['linear'],['zoom'],13,11,15,14], 'text-font': ['DIN Pro Medium','Arial Unicode MS Regular'], 'text-max-width': 10 },
        paint:  { 'text-color': '#1a1a1a', 'text-halo-color': ['get','color'], 'text-halo-width': 2 }
    }
};

function applyStopStyle(key) {
    if (!map.getLayer('stops-dot') || !map.getLayer('stop-labels')) return;
    const s = STOP_LABEL_STYLES[key];
    Object.entries(s.dot).forEach(([p, v]) => map.setPaintProperty('stops-dot', p, v));
    // Enforce data-driven perpendicular placement — clears any variable-anchor from prior state
    map.setLayoutProperty('stop-labels', 'text-variable-anchor', null);
    map.setLayoutProperty('stop-labels', 'text-radial-offset', null);
    map.setLayoutProperty('stop-labels', 'text-anchor', ['get', 'anchor']);
    map.setLayoutProperty('stop-labels', 'text-offset', [['get', 'offset_x'], ['get', 'offset_y']]);
    map.setLayoutProperty('stop-labels', 'text-field', s.field);
    Object.entries(s.layout).forEach(([p, v]) => map.setLayoutProperty('stop-labels', p, v));
    Object.entries(s.paint).forEach(([p, v]) => map.setPaintProperty('stop-labels', p, v));
    activateToggle('stop-style-group', key);
}

// ── Config panel collapse ─────────────────────────────────────────────
document.getElementById('config-toggle').addEventListener('click', () => {
    const body = document.getElementById('config-body');
    const chevron = document.getElementById('config-chevron');
    const open = body.classList.toggle('open');
    chevron.classList.toggle('open', open);
});

// ── Config panel ───────────────────────────────────────────────────────
function activateToggle(groupId, value) {
    document.querySelectorAll(`#${groupId} .tog`).forEach(b => {
        b.classList.toggle('active', b.dataset.value === value);
    });
}

document.getElementById('basemap-group').addEventListener('click', e => {
    const btn = e.target.closest('.tog');
    if (!btn) return;
    cfgBasemap = btn.dataset.value;
    activateToggle('basemap-group', cfgBasemap);
    const styleUrl = cfgBasemap === 'standard-satellite'
        ? 'mapbox://styles/mapbox/standard-satellite'
        : 'mapbox://styles/mapbox/standard';
    map.setStyle(styleUrl);
});

document.getElementById('theme-group').addEventListener('click', e => {
    const btn = e.target.closest('.tog');
    if (!btn) return;
    cfgTheme = btn.dataset.value;
    activateToggle('theme-group', cfgTheme);
    if (cfgTheme === 'monochrome') {
        // Switch to light-v11 (naturally near-monochrome) so trails stay in color
        if (isStandardStyle) { isStandardStyle = false; map.setStyle('mapbox://styles/mapbox/light-v11'); }
    } else {
        // Switch back to Standard if we were on light-v11
        if (!isStandardStyle) { isStandardStyle = true; map.setStyle('mapbox://styles/mapbox/standard'); }
        else map.setConfigProperty('basemap', 'colorTheme', cfgTheme);
    }
});

document.getElementById('light-group').addEventListener('click', e => {
    const btn = e.target.closest('.tog');
    if (!btn) return;
    cfgLight = btn.dataset.value;
    activateToggle('light-group', cfgLight);
    map.setConfigProperty('basemap', 'lightPreset', cfgLight);
});


document.getElementById('poi-group').addEventListener('click', e => {
    const btn = e.target.closest('.tog');
    if (!btn) return;
    cfgPOI = btn.dataset.value;
    activateToggle('poi-group', cfgPOI);
    const show = cfgPOI === 'show';
    map.setConfigProperty('basemap', 'showPointOfInterestLabels', show);
});

document.getElementById('head-group').addEventListener('click', e => {
    const btn = e.target.closest('.tog');
    if (!btn) return;
    cfgHead = btn.dataset.value;
    activateToggle('head-group', cfgHead);
    tramLayer.setVisible(cfgHead === 'distinct');
});

document.getElementById('stop-style-group').addEventListener('click', e => {
    const btn = e.target.closest('.tog');
    if (!btn) return;
    cfgStopStyle = btn.dataset.value;
    applyStopStyle(cfgStopStyle);
});
</script>
