<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luas 3D Replay</title>
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; display: block; }

        #controls {
            position: fixed; top: 16px; left: 16px; z-index: 10;
            background: rgba(22,33,62,0.92); border: 1px solid #0f3460;
            border-radius: 8px; padding: 14px 18px; color: #eee; min-width: 290px;
        }
        h1 { font-size: 16px; color: #e94560; margin-bottom: 12px; }
        .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
        label { font-size: 13px; color: #aaa; }
        select { background: #0f3460; color: #eee; border: 1px solid #e94560; border-radius: 4px; padding: 3px 7px; font-size: 13px; }
        button { background: #e94560; color: white; border: none; border-radius: 4px; padding: 5px 14px; cursor: pointer; font-size: 13px; }
        button:hover { background: #c73652; }
        button:disabled { background: #555; cursor: default; }
        #slider-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        #slider { flex: 1; accent-color: #e94560; }
        #time-display { font-size: 12px; color: #aaa; min-width: 65px; }
        #stats { font-size: 11px; color: #666; margin-top: 6px; }
        #loading-bar { height: 3px; background: #0f3460; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        #loading-fill { height: 100%; background: #e94560; width: 0%; transition: width 0.3s; }
        #loading-text { font-size: 11px; color: #666; margin-top: 4px; }

        #hint {
            position: fixed; bottom: 16px; left: 16px; font-size: 11px; color: #666;
            background: rgba(22,33,62,0.7); padding: 6px 10px; border-radius: 4px;
        }
        #legend {
            position: fixed; bottom: 16px; right: 16px;
            background: rgba(22,33,62,0.92); border: 1px solid #0f3460;
            border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #eee;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>

<div id="controls">
    <h1>🚊 Luas 3D Replay</h1>
    <div class="row">
        <label>Date:</label>
        <select id="date-select"><option>Loading...</option></select>
        <label>Hour:</label>
        <select id="hour-select"></select>
    </div>
    <div class="row">
        <button id="load-btn" disabled>Load</button>
        <button id="play-btn" disabled>▶ Play</button>
    </div>
    <div id="slider-row">
        <input type="range" id="slider" min="0" max="100" value="0" disabled style="flex:1">
        <span id="time-display">--:--:--</span>
    </div>
    <div id="stats">Trams: 0</div>
    <div id="loading-bar"><div id="loading-fill"></div></div>
    <div id="loading-text">Starting…</div>
</div>

<div id="hint">Drag to orbit · Scroll to zoom · Right-drag to pan</div>

<div id="legend">
    <div class="legend-item"><div class="dot" style="background:#e94560"></div> Red Line</div>
    <div class="legend-item"><div class="dot" style="background:#4caf50"></div> Green Line</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const API = 'https://sumitnarang.com/luas-api';

// ── Coordinate conversion ────────────────────────────────────────────
const LAT0 = 53.3445, LNG0 = -6.2600;
const M_LAT = 111320;
const M_LNG = 111320 * Math.cos(LAT0 * Math.PI / 180);
function toXZ(lat, lng) {
    return [(lng - LNG0) * M_LNG, -(lat - LAT0) * M_LAT];
}

// ── Renderer ─────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06060f);
scene.fog = new THREE.Fog(0x06060f, 5000, 18000);

// ── Camera ────────────────────────────────────────────────────────────
// Low-angle showing city center + nearby network, dark Uber-style
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 30000);
camera.position.set(-1200, 1800, 5500);
camera.lookAt(-1000, 0, 1500);

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});

// ── OrbitControls ─────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = 1.45;
controls.minDistance = 80;
controls.maxDistance = 20000;
controls.target.set(-1000, 0, 1500);

// ── Lights — night mode ────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a2a4a, 0.9));      // cold blue ambient
const moon = new THREE.DirectionalLight(0x2244aa, 0.5); // blue moonlight
moon.position.set(300, 800, 400);
moon.castShadow = true;
moon.shadow.mapSize.set(2048, 2048);
moon.shadow.camera.left = -4000; moon.shadow.camera.right = 4000;
moon.shadow.camera.top = 4000;  moon.shadow.camera.bottom = -4000;
moon.shadow.camera.far = 20000;
scene.add(moon);
// Warm street-lamp fill
scene.add(new THREE.HemisphereLight(0x111122, 0x222211, 0.4));

// ── Ground ────────────────────────────────────────────────────────────
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(60000, 60000),
    new THREE.MeshBasicMaterial({ color: 0x0c0c1a })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ── Progress bar ──────────────────────────────────────────────────────
function setProgress(pct, text) {
    document.getElementById('loading-fill').style.width = pct + '%';
    document.getElementById('loading-text').textContent = text;
}

// ── OSM buildings ─────────────────────────────────────────────────────
const BBOX = [53.335, -6.276, 53.354, -6.244];

async function loadBuildings() {
    setProgress(15, 'Fetching buildings from OpenStreetMap…');
    const q = `[out:json][timeout:30];(way["building"](${BBOX.join(',')}););out body;>;out skel qt;`;
    let data;
    try {
        const r = await fetch('https://overpass-api.de/api/interpreter', {
            method: 'POST', body: 'data=' + encodeURIComponent(q)
        });
        data = await r.json();
    } catch {
        setProgress(60, 'OSM unavailable — skipping buildings');
        return;
    }

    setProgress(45, 'Assembling buildings…');
    const nodes = {};
    data.elements.filter(e => e.type === 'node').forEach(n => { nodes[n.id] = [n.lat, n.lon]; });

    let built = 0;
    data.elements.filter(e => e.type === 'way' && e.tags?.building).forEach(way => {
        const coords = way.nodes.map(id => nodes[id]).filter(Boolean);
        if (coords.length < 4) return;
        const height = parseInt(way.tags.height) || (parseInt(way.tags['building:levels']) || 3) * 3.5;
        const pts = coords.slice(0, -1).map(([lat, lng]) => toXZ(lat, lng));
        try { addBuilding(pts, height); built++; } catch {}
    });
    setProgress(75, `Raised ${built} buildings`);
}

function addBuilding(pts, height) {
    const seed = Math.abs(pts[0][0] * 127 + pts[0][1] * 311) % 1;
    // Unlit charcoal — walls dark, roofs slightly lighter (depth cue)
    const w = 0.12 + seed * 0.13; // wall brightness  0.12–0.25
    const wallCol  = new THREE.Color(w * 0.85, w * 0.85, w);         // cool grey-blue
    const roofCol  = new THREE.Color(w * 1.25, w * 1.25, w * 1.55);  // lighter blue-grey roof

    // Walls
    const wallVerts = [];
    for (let i = 0; i < pts.length; i++) {
        const [ax, az] = pts[i], [bx, bz] = pts[(i + 1) % pts.length];
        wallVerts.push(ax,0,az, bx,0,bz, bx,height,bz, ax,0,az, bx,height,bz, ax,height,az);
    }
    const wallGeo = new THREE.BufferGeometry();
    wallGeo.setAttribute('position', new THREE.Float32BufferAttribute(wallVerts, 3));
    wallGeo.computeVertexNormals();
    scene.add(new THREE.Mesh(wallGeo, new THREE.MeshBasicMaterial({ color: wallCol, side: THREE.DoubleSide })));

    // Roof
    const roofVerts = [];
    for (let i = 1; i < pts.length - 1; i++) {
        roofVerts.push(pts[0][0], height, pts[0][1], pts[i][0], height, pts[i][1], pts[i+1][0], height, pts[i+1][1]);
    }
    if (roofVerts.length) {
        const roofGeo = new THREE.BufferGeometry();
        roofGeo.setAttribute('position', new THREE.Float32BufferAttribute(roofVerts, 3));
        roofGeo.computeVertexNormals();
        scene.add(new THREE.Mesh(roofGeo, new THREE.MeshBasicMaterial({ color: roofCol, side: THREE.DoubleSide })));
    }
}

// ── Luas tracks ───────────────────────────────────────────────────────
const TRACK_Y = 55; // float well above tallest buildings

function drawTrack(xzCoords, color) {
    if (xzCoords.length < 2) return;
    const points = xzCoords.map(([x,z]) => new THREE.Vector3(x, TRACK_Y, z));

    // Thin precise rail
    scene.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(points),
        new THREE.LineBasicMaterial({ color, depthTest: false })
    ));

    // Glow tube — always on top
    try {
        const curve = new THREE.CatmullRomCurve3(points);
        scene.add(new THREE.Mesh(
            new THREE.TubeGeometry(curve, points.length * 3, 3.5, 6, false),
            new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.30, depthTest: false })
        ));
    } catch {}
}

// ── Stop markers ──────────────────────────────────────────────────────
function drawStops(stops) {
    stops.forEach(s => {
        const [x, z] = toXZ(s.latitude, s.longitude);
        const col = s.line === 'Red' ? 0xe94560 : 0x4caf50;
        // Small sprite dot for each stop, visible at any zoom
        const canvas = document.createElement('canvas');
        canvas.width = 32; canvas.height = 32;
        const ctx = canvas.getContext('2d');
        ctx.beginPath(); ctx.arc(16, 16, 14, 0, Math.PI * 2);
        ctx.fillStyle = '#' + col.toString(16).padStart(6, '0') + 'cc';
        ctx.fill();
        ctx.beginPath(); ctx.arc(16, 16, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff'; ctx.fill();
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
            map: new THREE.CanvasTexture(canvas),
            sizeAttenuation: false,
            depthTest: false,
            transparent: true
        }));
        sprite.scale.set(0.022, 0.022, 1); // ~15px dot
        sprite.position.set(x, TRACK_Y + 5, z);
        scene.add(sprite);
    });
}

// ── Glowing trails ────────────────────────────────────────────────────
const TRAIL_LEN = 45;
const tramTrails = {};

function updateTrail(key, x, z, color) {
    if (!tramTrails[key]) tramTrails[key] = { positions: [], tube: null, outerTube: null };
    const trail = tramTrails[key];

    const newPos = new THREE.Vector3(x, TRACK_Y + 2, z);
    const last = trail.positions[trail.positions.length - 1];
    if (last && last.distanceTo(newPos) < 5) return; // skip tiny moves

    trail.positions.push(newPos.clone());
    if (trail.positions.length > TRAIL_LEN) trail.positions.shift();

    // Remove old geometry
    if (trail.tube) { scene.remove(trail.tube); trail.tube = null; }
    if (trail.outerTube) { scene.remove(trail.outerTube); trail.outerTube = null; }
    if (trail.positions.length < 2) return;

    try {
        const curve = new THREE.CatmullRomCurve3(trail.positions);
        const segs = trail.positions.length * 4;
        // Outer glow (wide, very transparent)
        trail.outerTube = new THREE.Mesh(
            new THREE.TubeGeometry(curve, segs, 10, 6, false),
            new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.18, depthTest: false })
        );
        scene.add(trail.outerTube);
        // Inner bright core
        trail.tube = new THREE.Mesh(
            new THREE.TubeGeometry(curve, segs, 4, 6, false),
            new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.75, depthTest: false })
        );
        scene.add(trail.tube);
    } catch {}
}

// ── Tram objects ──────────────────────────────────────────────────────
// Use sprites (screen-space billboards) so trams are visible at any zoom.
const tramMeshes = {};

function makeTramSprite(color) {
    const c = document.createElement('canvas');
    c.width = 64; c.height = 64;
    const ctx = c.getContext('2d');
    const hex = '#' + color.toString(16).padStart(6, '0');
    // Outer glow ring
    ctx.beginPath(); ctx.arc(32, 32, 30, 0, Math.PI * 2);
    ctx.fillStyle = hex + '88'; ctx.fill();
    // Solid colour disc
    ctx.beginPath(); ctx.arc(32, 32, 22, 0, Math.PI * 2);
    ctx.fillStyle = hex; ctx.fill();
    // White centre dot
    ctx.beginPath(); ctx.arc(32, 32, 9, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff'; ctx.fill();
    return new THREE.CanvasTexture(c);
}

function getTramMesh(key, color) {
    if (!tramMeshes[key]) {
        const group = new THREE.Group();

        // Sprite: always faces camera, fixed screen size at all zoom levels
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
            map: makeTramSprite(color),
            sizeAttenuation: false,   // size in pixels, not world units
            depthTest: false
        }));
        sprite.scale.set(0.038, 0.038, 1); // ~0.038 of viewport height ≈ 26px on a 700px screen
        group.add(sprite);

        // Also keep a small 3D body visible when zoomed right in
        const body = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 26), new THREE.MeshLambertMaterial({ color }));
        body.position.y = 2; body.castShadow = true;
        group.add(body);

        scene.add(group);
        tramMeshes[key] = group;
    }
    return tramMeshes[key];
}

// ── Replay logic ──────────────────────────────────────────────────────
let stops = [], frames = [], frameIndex = 0;
let playing = false, playInterval = null, animFrameId = null;

function lerp(a, b, t) { return a + (b - a) * t; }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

function getTramMap(frameData) {
    const trams = new Map();
    frameData[1].forEach(row => {
        const stopObj = stops.find(s => s.stop_abv === row.stop_abv);
        if (!stopObj) return;
        const key = `${row.destination}-${row.direction}`;
        if (!trams.has(key) || trams.get(key).due_mins > row.due_mins)
            trams.set(key, { ...row, stop_lat: stopObj.latitude, stop_lon: stopObj.longitude, line: stopObj.line });
    });
    return trams;
}

function renderFrame3D(frameData, prevFrameData, duration = 180) {
    if (animFrameId) cancelAnimationFrame(animFrameId);
    const toMap = getTramMap(frameData);
    const fromMap = prevFrameData ? getTramMap(prevFrameData) : null;

    for (const key of Object.keys(tramMeshes)) {
        if (!toMap.has(key)) {
            tramMeshes[key].visible = false;
            if (tramTrails[key]) {
                if (tramTrails[key].tube) scene.remove(tramTrails[key].tube);
                if (tramTrails[key].outerTube) scene.remove(tramTrails[key].outerTube);
                delete tramTrails[key];
            }
        }
    }

    const start = performance.now();
    function tick(now) {
        const raw = Math.min((now - start) / duration, 1);
        const t = easeInOut(raw);
        for (const [key, tram] of toMap) {
            const color = tram.line === 'Red' ? 0xe94560 : 0x4caf50;
            const mesh = getTramMesh(key, color);
            mesh.visible = true;
            let lat = tram.stop_lat, lon = tram.stop_lon;
            if (fromMap?.has(key)) {
                const from = fromMap.get(key);
                lat = lerp(from.stop_lat, tram.stop_lat, t);
                lon = lerp(from.stop_lon, tram.stop_lon, t);
            }
            const [x, z] = toXZ(lat, lon);
            mesh.position.set(x, TRACK_Y, z);
            // Update glowing trail at target stop position
            { const [tx, tz] = toXZ(tram.stop_lat, tram.stop_lon); updateTrail(key, tx, tz, color); }
            if (fromMap?.has(key)) {
                const from = fromMap.get(key);
                const [fx, fz] = toXZ(from.stop_lat, from.stop_lon);
                const dx = x - fx, dz = z - fz;
                if (Math.hypot(dx, dz) > 0.5) mesh.rotation.y = Math.atan2(dx, dz);
            }
        }
        if (raw < 1) animFrameId = requestAnimationFrame(tick);
    }
    animFrameId = requestAnimationFrame(tick);

    document.getElementById('stats').textContent = `Trams: ${toMap.size}`;
    document.getElementById('time-display').textContent =
        new Date(frameData[0]).toLocaleTimeString('en-IE', { timeZone: 'Europe/Dublin' });
}

function buildFrames(data) {
    const grouped = {};
    data.forEach(row => { const t = row.observed_at; if (!grouped[t]) grouped[t] = []; grouped[t].push(row); });
    return Object.entries(grouped).sort((a,b) => a[0].localeCompare(b[0]));
}

// ── UI ────────────────────────────────────────────────────────────────
async function loadDates() {
    const dates = await fetch(`${API}/api/dates`).then(r => r.json());
    document.getElementById('date-select').innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
}

function loadHours() {
    const sel = document.getElementById('hour-select');
    for (let h = 0; h < 24; h++) sel.innerHTML += `<option value="${h}">${String(h).padStart(2,'0')}:00</option>`;
    sel.value = 8;
}

document.getElementById('load-btn').addEventListener('click', async () => {
    const date = document.getElementById('date-select').value;
    const hour = document.getElementById('hour-select').value;
    document.getElementById('load-btn').disabled = true;
    document.getElementById('load-btn').textContent = 'Loading...';
    const data = await fetch(`${API}/api/replay?date=${date}&hour=${hour}`).then(r => r.json());
    frames = buildFrames(data);
    frameIndex = 0;
    const slider = document.getElementById('slider');
    slider.max = frames.length - 1; slider.value = 0; slider.disabled = false;
    document.getElementById('play-btn').disabled = false;
    document.getElementById('load-btn').disabled = false;
    document.getElementById('load-btn').textContent = 'Load';
    if (frames.length > 0) renderFrame3D(frames[0], null, 0);
});

document.getElementById('slider').addEventListener('input', e => {
    frameIndex = parseInt(e.target.value);
    if (frames[frameIndex]) renderFrame3D(frames[frameIndex], frames[frameIndex-1], 150);
});

document.getElementById('play-btn').addEventListener('click', () => {
    if (playing) {
        clearInterval(playInterval); playing = false;
        document.getElementById('play-btn').textContent = '▶ Play';
    } else {
        playing = true;
        document.getElementById('play-btn').textContent = '⏸ Pause';
        playInterval = setInterval(() => {
            if (frameIndex >= frames.length - 1) {
                clearInterval(playInterval); playing = false;
                document.getElementById('play-btn').textContent = '▶ Play'; return;
            }
            const prev = frames[frameIndex++];
            document.getElementById('slider').value = frameIndex;
            renderFrame3D(frames[frameIndex], prev, 180);
        }, 200);
    }
});

// ── Render loop ───────────────────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

// ── Init ──────────────────────────────────────────────────────────────
async function init() {
    setProgress(5, 'Loading stops…');
    stops = await fetch(`${API}/api/stops`).then(r => r.json());

    const redCoords = stops.filter(s => s.line === 'Red').sort((a,b) => a.longitude - b.longitude).map(s => toXZ(s.latitude, s.longitude));
    const greenCoords = stops.filter(s => s.line === 'Green').sort((a,b) => a.latitude - b.latitude).map(s => toXZ(s.latitude, s.longitude));
    drawTrack(redCoords, 0xe94560);
    drawTrack(greenCoords, 0x4caf50);
    drawStops(stops);

    await loadBuildings();

    setProgress(90, 'Loading dates…');
    await loadDates();
    loadHours();

    setProgress(100, 'Ready — pick a date and hour');
    setTimeout(() => {
        document.getElementById('loading-bar').style.display = 'none';
        document.getElementById('loading-text').style.display = 'none';
    }, 1000);
    document.getElementById('load-btn').disabled = false;
}

animate();
init();
</script>
</body>
</html>
