<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luas Replay</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }

        #controls {
            padding: 12px 20px;
            background: #16213e;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            border-bottom: 1px solid #0f3460;
        }

        #controls h1 { font-size: 18px; color: #e94560; margin-right: 8px; }

        select, input[type=range] { background: #0f3460; color: #eee; border: 1px solid #e94560; border-radius: 4px; padding: 4px 8px; }

        button {
            background: #e94560;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #c73652; }
        button:disabled { background: #555; cursor: default; }

        #time-display { font-size: 14px; color: #aaa; min-width: 140px; }

        #slider-wrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 200px; }
        #slider { flex: 1; accent-color: #e94560; }

        #stats { font-size: 12px; color: #aaa; margin-left: auto; }

        #map { flex: 1; }

        #legend {
            position: absolute;
            bottom: 30px;
            left: 10px;
            background: rgba(22,33,62,0.9);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid #0f3460;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red-dot { background: #e94560; }
        .green-dot { background: #4caf50; }
    </style>
</head>
<body>

<div id="controls">
    <h1>🚊 Luas Replay</h1>

    <label>Date:
        <select id="date-select"><option>Loading...</option></select>
    </label>

    <label>Hour:
        <select id="hour-select"></select>
    </label>

    <button id="load-btn">Load</button>
    <button id="play-btn" disabled>▶ Play</button>

    <div id="slider-wrap">
        <span style="font-size:12px;color:#aaa">Time:</span>
        <input type="range" id="slider" min="0" max="100" value="0" disabled>
        <span id="time-display">--:--:--</span>
    </div>

    <div id="stats">Trams: 0</div>
</div>

<div id="map"></div>

<div id="legend">
    <div class="legend-item"><div class="dot red-dot"></div> Red Line</div>
    <div class="legend-item"><div class="dot green-dot"></div> Green Line</div>
</div>

<script>
    const API = '/luas-api';
    const MAPBOX_TOKEN = 'YOUR_MAPBOX_TOKEN';

    mapboxgl.accessToken = MAPBOX_TOKEN;

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/outdoors-v12',
        center: [-6.27, 53.33],
        zoom: 12
    });

    let stops = [];
    let frames = [];
    let frameIndex = 0;
    let playing = false;
    let playInterval = null;
    let tramMarkers = {};  // key -> mapboxgl.Marker (persistent, never destroyed unless tram disappears)
    let animFrameId = null;

    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeInOut(t) { return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }

    async function loadDates() {
        const res = await fetch(`${API}/api/dates`);
        const dates = await res.json();
        const sel = document.getElementById('date-select');
        sel.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
    }

    function loadHours() {
        const sel = document.getElementById('hour-select');
        sel.innerHTML = '';
        for (let h = 0; h < 24; h++) {
            sel.innerHTML += `<option value="${h}">${String(h).padStart(2,'0')}:00</option>`;
        }
        sel.value = 8;
    }

    async function loadStops() {
        const res = await fetch(`${API}/api/stops`);
        stops = await res.json();

        const redCoords = stops.filter(s => s.line === 'Red')
            .sort((a, b) => a.longitude - b.longitude)
            .map(s => [s.longitude, s.latitude]);
        const greenCoords = stops.filter(s => s.line === 'Green')
            .sort((a, b) => a.latitude - b.latitude)
            .map(s => [s.longitude, s.latitude]);

        // Red line — outer glow, mid glow, crisp inner line
        map.addSource('red-line', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: redCoords } } });
        map.addLayer({ id: 'red-glow-outer', type: 'line', source: 'red-line', paint: { 'line-color': '#e94560', 'line-width': 16, 'line-opacity': 0.10, 'line-blur': 12 } });
        map.addLayer({ id: 'red-glow-mid',   type: 'line', source: 'red-line', paint: { 'line-color': '#e94560', 'line-width': 6,  'line-opacity': 0.28, 'line-blur': 4  } });
        map.addLayer({ id: 'red-line',        type: 'line', source: 'red-line', paint: { 'line-color': '#e94560', 'line-width': 2,  'line-opacity': 0.95 } });

        // Green line — outer glow, mid glow, crisp inner line
        map.addSource('green-line', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: greenCoords } } });
        map.addLayer({ id: 'green-glow-outer', type: 'line', source: 'green-line', paint: { 'line-color': '#4caf50', 'line-width': 16, 'line-opacity': 0.10, 'line-blur': 12 } });
        map.addLayer({ id: 'green-glow-mid',   type: 'line', source: 'green-line', paint: { 'line-color': '#4caf50', 'line-width': 6,  'line-opacity': 0.28, 'line-blur': 4  } });
        map.addLayer({ id: 'green-line',        type: 'line', source: 'green-line', paint: { 'line-color': '#4caf50', 'line-width': 2,  'line-opacity': 0.95 } });

        stops.forEach(s => {
            const el = document.createElement('div');
            el.style.cssText = `width:6px;height:6px;border-radius:50%;background:${s.line==='Red'?'#e94560':'#4caf50'};border:1px solid white;cursor:pointer;`;
            const popup = new mapboxgl.Popup({ offset: 8, closeButton: false }).setText(`${s.stop_name} (${s.line} Line)`);
            const marker = new mapboxgl.Marker(el)
                .setLngLat([s.longitude, s.latitude])
                .setPopup(popup)
                .addTo(map);
            el.addEventListener('mouseenter', () => marker.togglePopup());
            el.addEventListener('mouseleave', () => marker.togglePopup());
        });
    }

    function buildFrames(data) {
        const grouped = {};
        data.forEach(row => {
            const t = row.observed_at;
            if (!grouped[t]) grouped[t] = [];
            grouped[t].push(row);
        });
        return Object.entries(grouped).sort((a, b) => a[0].localeCompare(b[0]));
    }

    // Returns a Map keyed by "destination-direction" with the closest stop per tram
    function getTramMap(frameData) {
        const trams = new Map();
        frameData[1].forEach(row => {
            const stopObj = stops.find(s => s.stop_abv === row.stop_abv);
            if (!stopObj) return;
            const key = `${row.destination}-${row.direction}`;
            if (!trams.has(key) || trams.get(key).due_mins > row.due_mins) {
                trams.set(key, { ...row, stop_lat: stopObj.latitude, stop_lon: stopObj.longitude });
            }
        });
        return trams;
    }

    function renderFrame(frameData, prevFrameData, animDuration = 180) {
        if (animFrameId) cancelAnimationFrame(animFrameId);

        const toMap = getTramMap(frameData);
        const fromMap = prevFrameData ? getTramMap(prevFrameData) : null;

        // Remove markers for trams that vanished
        for (const key of Object.keys(tramMarkers)) {
            if (!toMap.has(key)) {
                tramMarkers[key].remove();
                delete tramMarkers[key];
            }
        }

        // Create markers for newly appearing trams
        for (const [key, tram] of toMap) {
            if (!tramMarkers[key]) {
                const el = document.createElement('div');
                const color = tram.line === 'Red' ? '#e94560' : '#4caf50';
                el.style.cssText = `
                    width:16px; height:16px; border-radius:50%;
                    background:${color}; border:2px solid white;
                    box-shadow: 0 0 8px ${color}, 0 0 20px ${color}99;
                    cursor:pointer;
                `;
                const startPos = (fromMap && fromMap.has(key))
                    ? [fromMap.get(key).stop_lon, fromMap.get(key).stop_lat]
                    : [tram.stop_lon, tram.stop_lat];
                tramMarkers[key] = new mapboxgl.Marker(el)
                    .setLngLat(startPos)
                    .setPopup(new mapboxgl.Popup({ offset: 10 }).setText(`→ ${tram.destination} | ${tram.due_mins} min away`))
                    .addTo(map);
            }
        }

        // Animate existing markers from old position to new position
        const start = performance.now();
        function tick(now) {
            const raw = Math.min((now - start) / animDuration, 1);
            const t = easeInOut(raw);
            for (const [key, tram] of toMap) {
                const marker = tramMarkers[key];
                if (!marker) continue;
                if (fromMap && fromMap.has(key)) {
                    const from = fromMap.get(key);
                    marker.setLngLat([
                        lerp(from.stop_lon, tram.stop_lon, t),
                        lerp(from.stop_lat, tram.stop_lat, t)
                    ]);
                } else {
                    marker.setLngLat([tram.stop_lon, tram.stop_lat]);
                }
            }
            if (raw < 1) animFrameId = requestAnimationFrame(tick);
        }
        animFrameId = requestAnimationFrame(tick);

        document.getElementById('stats').textContent = `Trams: ${toMap.size}`;
        document.getElementById('time-display').textContent =
            new Date(frameData[0]).toLocaleTimeString('en-IE', { timeZone: 'Europe/Dublin' });
    }

    document.getElementById('load-btn').addEventListener('click', async () => {
        const date = document.getElementById('date-select').value;
        const hour = document.getElementById('hour-select').value;
        document.getElementById('load-btn').disabled = true;
        document.getElementById('load-btn').textContent = 'Loading...';
        const res = await fetch(`${API}/api/replay?date=${date}&hour=${hour}`);
        const data = await res.json();
        frames = buildFrames(data);
        frameIndex = 0;
        const slider = document.getElementById('slider');
        slider.max = frames.length - 1;
        slider.value = 0;
        slider.disabled = false;
        document.getElementById('play-btn').disabled = false;
        document.getElementById('load-btn').disabled = false;
        document.getElementById('load-btn').textContent = 'Load';
        if (frames.length > 0) renderFrame(frames[0], null, 0);
    });

    document.getElementById('slider').addEventListener('input', e => {
        frameIndex = parseInt(e.target.value);
        if (frames[frameIndex]) renderFrame(frames[frameIndex], frames[frameIndex - 1], 150);
    });

    document.getElementById('play-btn').addEventListener('click', () => {
        if (playing) {
            clearInterval(playInterval);
            playing = false;
            document.getElementById('play-btn').textContent = '▶ Play';
        } else {
            playing = true;
            document.getElementById('play-btn').textContent = '⏸ Pause';
            playInterval = setInterval(() => {
                if (frameIndex >= frames.length - 1) {
                    clearInterval(playInterval);
                    playing = false;
                    document.getElementById('play-btn').textContent = '▶ Play';
                    return;
                }
                const prev = frames[frameIndex];
                frameIndex++;
                document.getElementById('slider').value = frameIndex;
                renderFrame(frames[frameIndex], prev, 180);
            }, 200);
        }
    });

    map.on('load', async () => {
        await loadStops();
        await loadDates();
        loadHours();
    });
</script>
</body>
</html>
